name: Build Infinity Kernel

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Infinity Kernel repo
        uses: actions/checkout@v4
        with:
          path: infinity

      - name: Clone Xiaomi kernel source (vayu-r-oss)
        timeout-minutes: 15
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== Cloning Xiaomi kernel source ==="
          git clone --depth=1 -b vayu-r-oss \
            https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
            kernel_src
          
          echo "=== Available defconfigs ==="
          ls kernel_src/arch/arm64/configs/*defconfig 2>/dev/null || echo "No defconfigs found!"

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git wget unzip curl bc bison build-essential cpio \
            flex g++ gcc-aarch64-linux-gnu libc6-dev-i386 \
            libelf-dev libssl-dev python3 zstd liblz4-tool \
            device-tree-compiler rsync file

      - name: Download Proton Clang toolchain
        timeout-minutes: 15
        run: |
          PROTON_PATH=$GITHUB_WORKSPACE/proton-clang
          if [ ! -x "$PROTON_PATH/bin/clang" ]; then
            echo "Downloading Proton Clang 17..."
            mkdir -p "$PROTON_PATH"
            cd "$PROTON_PATH"
            
            # Try to download from releases
            wget -q --show-progress "https://github.com/kdrag0n/proton-clang/releases/download/17.0/proton-clang-17.tar.gz" -O proton.tar.gz || \
            git clone --depth=1 https://github.com/kdrag0n/proton-clang.git . || \
              { echo "ERROR: Failed to download Proton Clang"; exit 1; }
            
            if [ -f proton.tar.gz ]; then
              tar -xzf proton.tar.gz --strip-components=1
              rm proton.tar.gz
            fi
            
            if [ ! -x "$PROTON_PATH/bin/clang" ]; then
              echo "ERROR: clang not found after installation"
              exit 1
            fi
            
            # Rename LLVM host tools
            for tool in as ar ld nm objcopy objdump ranlib strip; do
              if [ -f "$PROTON_PATH/bin/$tool" ]; then
                mv "$PROTON_PATH/bin/$tool" "$PROTON_PATH/bin/$tool.llvm"
              fi
            done
            echo "Renamed LLVM host tools to *.llvm"
          fi
          echo "Proton Clang ready:"
          "$PROTON_PATH/bin/clang" --version | head -1

      - name: Prepare Infinity Kernel customizations
        run: |
          cd $GITHUB_WORKSPACE/kernel_src
          
          # Create infinity_defconfig if missing
          if [ ! -f arch/arm64/configs/infinity_defconfig ]; then
            echo "Creating infinity_defconfig..."
            mkdir -p arch/arm64/configs
            cat > arch/arm64/configs/infinity_defconfig << 'EOF'
          # Infinity Kernel Configuration Fragment
          CONFIG_LOCALVERSION="-Infinity-v1.0.7"
          CONFIG_LOCALVERSION_AUTO=n
          CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y
          EOF
          fi
          
          # Create charging driver header if missing
          if [ ! -f include/linux/infinity_charging_control.h ]; then
            echo "Creating infinity_charging_control.h..."
            mkdir -p include/linux
            cat > include/linux/infinity_charging_control.h << 'EOF'
          #ifndef _LINUX_INFINITY_CHARGING_CONTROL_H
          #define _LINUX_INFINITY_CHARGING_CONTROL_H
          #define INFINITY_CHARGING_MAGIC 0x494E4649
          struct infinity_charging_info {
            unsigned int magic;
            unsigned int version;
            unsigned int max_charging_ma;
          };
          #endif
          EOF
          fi
          
          # Copy charging driver files
          if [ -d $GITHUB_WORKSPACE/infinity/drivers/charging ]; then
            echo "Copying charging driver..."
            cp -r $GITHUB_WORKSPACE/infinity/drivers/charging drivers/infinity_charging
            
            if [ -f $GITHUB_WORKSPACE/infinity/include/linux/infinity_charging_control.h ]; then
              cp $GITHUB_WORKSPACE/infinity/include/linux/infinity_charging_control.h include/linux/
            fi
            
            # Update Makefiles
            if ! grep -q 'infinity_charging' drivers/Makefile; then
              echo 'obj-y += infinity_charging/' >> drivers/Makefile
            fi
            if ! grep -q 'infinity_charging' drivers/Kconfig; then
              echo 'source "drivers/infinity_charging/Kconfig"' >> drivers/Kconfig
            fi
          fi
          
          # Copy Infinity defconfig
          if [ -f $GITHUB_WORKSPACE/infinity/arch/arm64/configs/infinity_defconfig ]; then
            echo "Copying Infinity defconfig..."
            cp $GITHUB_WORKSPACE/infinity/arch/arm64/configs/infinity_defconfig arch/arm64/configs/
          fi

      - name: Apply Infinity patches
        run: |
          cd $GITHUB_WORKSPACE/kernel_src
          
          if [ -f $GITHUB_WORKSPACE/infinity/patches/apply_all.sh ]; then
            echo "Applying Infinity patches..."
            bash $GITHUB_WORKSPACE/infinity/patches/apply_all.sh .
          else
            echo "[WARN] apply_all.sh not found, skipping patches"
          fi

      - name: Configure kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_src
          
          PROTON_PATH=$GITHUB_WORKSPACE/proton-clang
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export HOSTCC=gcc
          export PATH="$PROTON_PATH/bin:$PATH"
          export LD_LIBRARY_PATH="$PROTON_PATH/lib:$LD_LIBRARY_PATH"
          
          echo "=== Environment ==="
          echo "CC: $(which clang)"
          echo "PATH: $PATH"
          echo ""
          
          # Find base defconfig
          BASE_DEF=""
          for candidate in vayu_defconfig vayu-perf_defconfig vayu_user_defconfig; do
            if [ -f "arch/arm64/configs/${candidate}" ]; then
              BASE_DEF="$candidate"
              echo "Found base defconfig: $BASE_DEF"
              break
            fi
          done
          
          if [ -z "$BASE_DEF" ]; then
            BASE_DEF=$(ls arch/arm64/configs/*defconfig 2>/dev/null | head -1 | xargs basename)
            echo "Using fallback defconfig: $BASE_DEF"
          fi
          
          if [ -z "$BASE_DEF" ]; then
            echo "ERROR: No defconfig found!"
            ls -la arch/arm64/configs/
            exit 1
          fi
          
          echo ""
          echo "=== Applying base defconfig: $BASE_DEF ==="
          make ARCH=$ARCH SUBARCH=$SUBARCH \
               CROSS_COMPILE=$CROSS_COMPILE \
               CC=clang \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               HOSTCC=$HOSTCC \
               O=out \
               "$BASE_DEF"
          
          # Merge Infinity defconfig
          if [ -f arch/arm64/configs/infinity_defconfig ]; then
            echo ""
            echo "=== Merging Infinity defconfig ==="
            if [ -f scripts/kconfig/merge_config.sh ]; then
              scripts/kconfig/merge_config.sh \
                out/.config \
                arch/arm64/configs/infinity_defconfig \
                -O out/ \
                2>&1 || true
            fi
          fi
          
          # Disable Clang-incompatible configs
          echo ""
          echo "=== Disabling Clang-incompatible subsystems ==="
          for cfg in STAGING MEDIA_SUPPORT MEDIA_CAMERA_SUPPORT MEDIA_RC_SUPPORT \
            RC_CORE LIRC VIDEO_DEV V4L_PLATFORM_DRIVERS V4L_MEM2MEM_DRIVERS \
            RADIO_ADAPTERS SOUND SND SND_SOC SND_PCM_CODEC \
            FB FB_EFI FB_TILEBLITTING VT COMEDI AGP INFINIBAND \
            FAULT_INJECTION SAMPLES VHOST VHOST_NET VHOST_SCSI VHOST_VSOCK \
            IIO DRM_LEGACY; do
            sed -i "s/^CONFIG_${cfg}=y/# CONFIG_${cfg} is not set/" out/.config
            sed -i "s/^CONFIG_${cfg}=m/# CONFIG_${cfg} is not set/" out/.config
          done
          
          for prefix in CONFIG_STAGING CONFIG_SOUND CONFIG_SND_ CONFIG_MEDIA_ \
            CONFIG_RC_ CONFIG_VIDEO_ CONFIG_V4L_ CONFIG_RADIO_ CONFIG_FB_ \
            CONFIG_VT= CONFIG_DRM_LEGACY CONFIG_COMEDI CONFIG_AGP \
            CONFIG_INFINIBAND CONFIG_SAMPLES= CONFIG_VHOST_; do
            sed -i "/^${prefix}/d" out/.config
          done
          
          # Resolve dependencies
          echo ""
          echo "=== Resolving kernel config dependencies ==="
          make ARCH=$ARCH SUBARCH=$SUBARCH \
               CROSS_COMPILE=$CROSS_COMPILE \
               CC=clang \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               HOSTCC=$HOSTCC \
               O=out \
               olddefconfig

      - name: Build kernel
        timeout-minutes: 45
        run: |
          cd $GITHUB_WORKSPACE/kernel_src
          
          PROTON_PATH=$GITHUB_WORKSPACE/proton-clang
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export HOSTCC=gcc
          export PATH="$PROTON_PATH/bin:$PATH"
          export LD_LIBRARY_PATH="$PROTON_PATH/lib:$LD_LIBRARY_PATH"
          
          echo "=== Building kernel (this may take 30-45 minutes) ==="
          make -j$(nproc) ARCH=$ARCH SUBARCH=$SUBARCH \
               CROSS_COMPILE=$CROSS_COMPILE \
               CC=clang \
               CLANG_TRIPLE=$CLANG_TRIPLE \
               HOSTCC=$HOSTCC \
               KCFLAGS="-Wno-error" \
               O=out \
               2>&1 | tee build.log
          
          echo ""
          echo "=== Build Summary ==="
          ERROR_COUNT=$(grep -c "error:" build.log 2>/dev/null || echo 0)
          echo "Total errors: $ERROR_COUNT"
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "---"
            grep -n "error:" build.log | head -40
          fi
          
          echo ""
          echo "=== Checking kernel image ==="
          if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
            echo "✓ BUILD SUCCESS — Image.gz-dtb"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          elif [ -f out/arch/arm64/boot/Image.gz ]; then
            echo "✓ BUILD SUCCESS — Image.gz"
            ls -lh out/arch/arm64/boot/Image.gz
          elif [ "$ERROR_COUNT" -gt 0 ]; then
            echo "✗ BUILD FAILED — compilation errors found"
            exit 1
          else
            echo "✗ BUILD FAILED — no kernel image produced"
            tail -50 build.log
            exit 1
          fi

      - name: Package AnyKernel3 flasher
        run: |
          cd $GITHUB_WORKSPACE/infinity/AnyKernel3
          
          # Copy kernel image
          if [ -f $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/Image.gz-dtb Image.gz-dtb
          elif [ -f $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/Image.gz ]; then
            cp $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/Image.gz Image.gz
          else
            echo "ERROR: No kernel image found"
            exit 1
          fi
          
          # Copy DTB/DTBO files
          find $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/dts/qcom/ \
            -maxdepth 1 \( -name "*.dtb" -o -name "*.dtbo" \) \
            -exec cp {} . \; 2>/dev/null || true
          
          [ -f $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/dtbo.img ] && \
            cp $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/dtbo.img . 2>/dev/null || true
          [ -f $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/dtb.img ] && \
            cp $GITHUB_WORKSPACE/kernel_src/out/arch/arm64/boot/dtb.img . 2>/dev/null || true
          
          chmod 755 tools/*
          
          # Create flashable ZIP
          echo "=== Creating flashable ZIP ==="
          zip -r9 $GITHUB_WORKSPACE/InfinityKernel-v1.0.7-vayu.zip . \
            -x ".git*" "patch/*" "ramdisk/*" "split_img/*"
          
          ls -lh $GITHUB_WORKSPACE/InfinityKernel-v1.0.7-vayu.zip

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InfinityKernel-vayu
          path: InfinityKernel-v1.0.7-vayu.zip
          retention-days: 30

      - name: Create GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: InfinityKernel-v1.0.7-vayu.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
