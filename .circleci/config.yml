version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    environment:
      PROJECT_DIR: /tmp/infinity-kernel-build
      KERNEL_DIR: /tmp/infinity-kernel-build/kernel_src
      PROTON_PATH: /tmp/infinity-kernel-build/proton-clang
      ARCH: arm64
      SUBARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      CLANG_TRIPLE: aarch64-linux-gnu-
      GIT_TERMINAL_PROMPT: 0
      ZIP_NAME: InfinityKernel-v1.0.23-vayu.zip
    resource_class: large
    steps:
      - checkout
      - run:
          name: Setup build directory
          command: |
            mkdir -p "$PROJECT_DIR"
            cp -a /root/project/. "$PROJECT_DIR/"
      - run:
          name: Install build dependencies
          command: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -y
            apt-get install -y \
              git wget unzip curl bc bison build-essential cpio \
              flex g++ gcc-aarch64-linux-gnu libc6-dev-i386 \
              libelf-dev libssl-dev python3 python3-pip zstd \
              liblz4-tool device-tree-compiler rsync file \
              make binutils
            ln -sf /usr/bin/python3 /usr/bin/python
            python --version
      - run:
          name: Clone Proton Clang toolchain
          no_output_timeout: 20m
          command: |
            cd "$PROJECT_DIR"
            if [ ! -x "$PROTON_PATH/bin/clang" ]; then
              echo "Cloning Proton Clang..."
              git clone --depth=1 \
                https://github.com/kdrag0n/proton-clang.git \
                "$PROTON_PATH"
              if [ ! -x "$PROTON_PATH/bin/clang" ]; then
                echo "ERROR: clang not found after clone"
                exit 1
              fi
              rm -f "$PROTON_PATH/bin/as"
              rm -f "$PROTON_PATH/bin/ld"
              ln -sf ld.lld "$PROTON_PATH/bin/ld"
              REAL_CLANG=$(find "$PROTON_PATH/bin" -name 'clang-*' -type f -executable | head -1)
              REAL_NAME=$(basename "$REAL_CLANG")
              echo "Real clang binary: $REAL_NAME"
              rm -f "$PROTON_PATH/bin/clang"
              ln -sf "$REAL_NAME" "$PROTON_PATH/bin/clang"
              for v in 13 14 15 16 17; do
                if [ "$REAL_NAME" != "clang-$v" ]; then
                  rm -f "$PROTON_PATH/bin/clang-$v"
                  ln -sf "$REAL_NAME" "$PROTON_PATH/bin/clang-$v"
                fi
              done
              echo "Proton Clang symlinks configured:"
              ls -la "$PROTON_PATH/bin/clang" "$PROTON_PATH/bin/$REAL_NAME" "$PROTON_PATH/bin/ld" 2>/dev/null || true
            fi
            echo "Proton Clang ready:"
            "$PROTON_PATH/bin/clang" --version | head -1
            echo "ld.lld: $($PROTON_PATH/bin/ld.lld --version 2>&1 | head -1)"
      - run:
          name: Clone Xiaomi kernel source
          no_output_timeout: 20m
          command: |
            cd "$PROJECT_DIR"
            if [ -d "$KERNEL_DIR/.git" ]; then
              echo "Kernel source already cloned, skipping..."
            else
              echo "Cloning Xiaomi kernel source..."
              git clone --depth=1 -b vayu-r-oss \
                https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
                "$KERNEL_DIR" || {
                echo "FATAL: Failed to clone kernel source"
                exit 1
              }
            fi
            echo "Kernel source ready: $(ls "$KERNEL_DIR/Makefile" >/dev/null && echo OK || echo MISSING)"
      - run:
          name: Fix OpenSSL 3.0 compatibility
          command: |
            cd "$KERNEL_DIR"
            for f in scripts/extract-cert.c scripts/sign-file.c; do
              if [ -f "$f" ] && ! grep -q 'OPENSSL_SUPPRESS_DEPRECATED' "$f"; then
                sed -i '1i\#define OPENSSL_SUPPRESS_DEPRECATED 1' "$f"
                echo "Patched $f"
              fi
            done
      - run:
          name: Copy Infinity Kernel defconfig
          command: |
            cp "$PROJECT_DIR/arch/arm64/configs/infinity_defconfig" \
               "$KERNEL_DIR/arch/arm64/configs/infinity_defconfig"
      - run:
          name: Apply kernel patches
          command: |
            bash "$PROJECT_DIR/patches/apply_all.sh" "$KERNEL_DIR"
      - run:
          name: Integrate charging driver
          command: |
            cd "$KERNEL_DIR"
            cp -r "$PROJECT_DIR/drivers/charging" drivers/infinity_charging
            cp "$PROJECT_DIR/include/linux/infinity_charging_control.h" include/linux/
            mkdir -p scripts/charging_bypass
            cp "$PROJECT_DIR/scripts/charging_bypass/infinity_charging.dts" scripts/charging_bypass/
            echo 'obj-y += infinity_charging/' >> drivers/Makefile
            echo 'source "drivers/infinity_charging/Kconfig"' >> drivers/Kconfig
      - run:
          name: Configure kernel defconfig
          command: |
            cd "$KERNEL_DIR"
            export PATH="$PROTON_PATH/bin:$PATH"
            export LD_LIBRARY_PATH="$PROTON_PATH/lib:$LD_LIBRARY_PATH"
            echo "=== Toolchain verification ==="
            echo "clang:     $(which clang) ($(clang --version 2>&1 | head -1))"
            echo "clang-13:  $(which clang-13)"
            echo "ld:        $(which ld) ($(ld --version 2>&1 | head -1))"
            echo "as:        $(which as) ($(as --version 2>&1 | head -1))"
            echo "CROSS:     $(which aarch64-linux-gnu-gcc)"
            echo "HOSTCC:    $(which gcc)"
            echo ""
            rm -f .config
            rm -rf out/
            BASE_DEFCONFIG="vayu_defconfig"
            if [ -f "arch/arm64/configs/vayu_user_defconfig" ]; then
              BASE_DEFCONFIG="vayu_user_defconfig"
              echo "Using vayu_user_defconfig as base"
            else
              echo "Using vayu_defconfig as base"
            fi
            echo "Merging infinity_defconfig on top of $BASE_DEFCONFIG..."
            scripts/kconfig/merge_config.sh -O out/ \
              arch/arm64/configs/${BASE_DEFCONFIG} \
              arch/arm64/configs/infinity_defconfig \
              </dev/null || true
            echo "=== Disabling Clang-incompatible configs ==="
            for cfg in \
              CONFIG_CC_STACKPROTECTOR CONFIG_CC_STACKPROTECTOR_STRONG \
              CONFIG_CC_STACKPROTECTOR_NONE CONFIG_CC_STACKPROTECTOR_REGULAR \
              CONFIG_STACKPROTECTOR \
              CONFIG_RC_CORE CONFIG_LIRC CONFIG_MEDIA_RC_SUPPORT \
              CONFIG_MEDIA_SUPPORT CONFIG_MEDIA_CAMERA_SUPPORT \
              CONFIG_MEDIA_SUBSYSTEM_AUTOSELECT \
              CONFIG_VIDEO_DEV CONFIG_V4L_PLATFORM_DRIVERS \
              CONFIG_V4L_MEM2MEM_DRIVERS CONFIG_RADIO_ADAPTERS \
              CONFIG_SOUND CONFIG_SND CONFIG_SND_SOC \
              CONFIG_DRM_LEGACY CONFIG_AGP \
              CONFIG_INFINIBAND CONFIG_FAULT_INJECTION \
              CONFIG_SAMPLES CONFIG_COMEDI \
              CONFIG_STAGING CONFIG_VT \
              CONFIG_FB \
              CONFIG_VHOST CONFIG_VHOST_NET CONFIG_VHOST_SCSI \
              CONFIG_VHOST_VSOCK CONFIG_STAGING_BOARD; do
              ./scripts/config --file out/.config --disable $cfg 2>/dev/null || true
            done
            make ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 HOSTCFLAGS="-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error" \
                 O=out \
                 olddefconfig \
                 </dev/null || true
            echo "=== Second pass disable (after Kconfig deps resolved) ==="
            for cfg in \
              CONFIG_RC_CORE CONFIG_LIRC CONFIG_MEDIA_RC_SUPPORT \
              CONFIG_MEDIA_SUPPORT CONFIG_MEDIA_CAMERA_SUPPORT \
              CONFIG_MEDIA_SUBSYSTEM_AUTOSELECT \
              CONFIG_VIDEO_DEV CONFIG_V4L_PLATFORM_DRIVERS \
              CONFIG_V4L_MEM2MEM_DRIVERS CONFIG_RADIO_ADAPTERS \
              CONFIG_SOUND CONFIG_SND CONFIG_SND_SOC \
              CONFIG_DRM_LEGACY CONFIG_AGP \
              CONFIG_INFINIBAND CONFIG_FAULT_INJECTION \
              CONFIG_SAMPLES CONFIG_COMEDI \
              CONFIG_STAGING CONFIG_VT \
              CONFIG_FB \
              CONFIG_VHOST CONFIG_VHOST_NET CONFIG_VHOST_SCSI \
              CONFIG_VHOST_VSOCK CONFIG_STAGING_BOARD; do
              ./scripts/config --file out/.config --disable $cfg 2>/dev/null || true
            done
            make ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 HOSTCFLAGS="-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error" \
                 O=out \
                 olddefconfig \
                 </dev/null || true
            echo "=== Final pass: force-kill with sed ==="
            for cfg in \
              CONFIG_RC_CORE CONFIG_LIRC CONFIG_MEDIA_RC_SUPPORT \
              CONFIG_MEDIA_SUPPORT CONFIG_MEDIA_CAMERA_SUPPORT \
              CONFIG_MEDIA_SUBSYSTEM_AUTOSELECT \
              CONFIG_VIDEO_DEV CONFIG_V4L_PLATFORM_DRIVERS \
              CONFIG_V4L_MEM2MEM_DRIVERS CONFIG_RADIO_ADAPTERS \
              CONFIG_SOUND CONFIG_SND CONFIG_SND_SOC \
              CONFIG_DRM_LEGACY CONFIG_AGP \
              CONFIG_INFINIBAND CONFIG_FAULT_INJECTION \
              CONFIG_SAMPLES CONFIG_COMEDI \
              CONFIG_STAGING CONFIG_VT \
              CONFIG_FB \
              CONFIG_VHOST CONFIG_VHOST_NET CONFIG_VHOST_SCSI \
              CONFIG_VHOST_VSOCK CONFIG_STAGING_BOARD \
              CONFIG_CC_STACKPROTECTOR CONFIG_CC_STACKPROTECTOR_STRONG \
              CONFIG_STACKPROTECTOR; do
              sed -i "/^${cfg}=/d" out/.config 2>/dev/null || true
              if ! grep -q "${cfg}" out/.config 2>/dev/null; then
                echo "# ${cfg} is not set" >> out/.config
              fi
            done
            echo "=== Verifying disabled configs ==="
            for cfg in CONFIG_RC_CORE CONFIG_MEDIA_SUPPORT CONFIG_SOUND CONFIG_SND CONFIG_STAGING CONFIG_VT CONFIG_FB CONFIG_VHOST CONFIG_CC_STACKPROTECTOR; do
              VAL=$(grep "^${cfg}=" out/.config 2>/dev/null || true)
              if [ -n "$VAL" ]; then
                echo "WARN: $VAL is still enabled!"
              else
                echo "OK:   $cfg disabled"
              fi
            done
            echo "=== Config done ==="
            echo "SUFS_FS:  $(grep 'CONFIG_SUFS_FS' out/.config 2>/dev/null || echo NOT SET)"
            echo "CHARGING: $(grep 'CONFIG_CHARGING_CONTROL' out/.config 2>/dev/null || echo NOT SET)"
            echo "ZRAM:     $(grep 'CONFIG_ZRAM' out/.config 2>/dev/null || echo NOT SET)"
            echo "STACKP:   $(grep 'CONFIG_CC_STACKPROTECTOR' out/.config 2>/dev/null || echo DISABLED)"
      - run:
          name: Build kernel phase 1 - scripts serial verbose
          no_output_timeout: 30m
          command: |
            cd "$KERNEL_DIR"
            export PATH="$PROTON_PATH/bin:$PATH"
            export LD_LIBRARY_PATH="$PROTON_PATH/lib:$LD_LIBRARY_PATH"
            echo "=== Phase 1: Building scripts (serial, V=1) ==="
            make -j1 V=1 \
                 ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 HOSTCFLAGS="-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error" \
                 O=out \
                 scripts \
                 2>&1 | tee scripts_build.log
            if grep -q "error:" scripts_build.log; then
              echo ""
              echo "=== SCRIPTS BUILD FAILED ==="
              grep -n "error:" scripts_build.log | head -20
              exit 1
            fi
            echo "=== Phase 1 complete: scripts OK ==="
      - run:
          name: Build kernel phase 2 - full parallel
          no_output_timeout: 60m
          command: |
            cd "$KERNEL_DIR"
            export PATH="$PROTON_PATH/bin:$PATH"
            export LD_LIBRARY_PATH="$PROTON_PATH/lib:$LD_LIBRARY_PATH"
            echo "=== Phase 2: Building kernel (parallel, -j$(nproc)) ==="
            make -j$(nproc) \
                 ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 HOSTCFLAGS="-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error" \
                 O=out \
                 2>&1 | tee build.log
            echo ""
            echo "=== Error Summary ==="
            grep -c "error:" build.log | xargs -I{} echo "{} errors"
            grep -n "error:" build.log | head -30 || echo "No errors found"
            echo "=== Warning Summary ==="
            grep -c "warning:" build.log | xargs -I{} echo "{} warnings"
            if grep -q "error:" build.log; then
              echo ""
              echo "=== BUILD FAILED ==="
              exit 1
            fi
            echo "=== BUILD SUCCESS ==="
            ls -lh out/arch/arm64/boot/Image.gz-dtb 2>/dev/null || \
            ls -lh out/arch/arm64/boot/Image.gz 2>/dev/null || \
              { echo "ERROR: No kernel image found!"; exit 1; }
      - run:
          name: Package AnyKernel3 ZIP
          command: |
            cd "$PROJECT_DIR"
            if [ -f "$KERNEL_DIR/out/arch/arm64/boot/Image.gz-dtb" ]; then
              cp "$KERNEL_DIR/out/arch/arm64/boot/Image.gz-dtb" AnyKernel3/
              echo "Using Image.gz-dtb"
            elif [ -f "$KERNEL_DIR/out/arch/arm64/boot/Image.gz" ]; then
              cp "$KERNEL_DIR/out/arch/arm64/boot/Image.gz" AnyKernel3/
              echo "Using Image.gz"
            else
              echo "ERROR: No kernel image found"
              exit 1
            fi
            find "$KERNEL_DIR/out/arch/arm64/boot/dts/qcom/" \
              -maxdepth 1 \( -name "*.dtb" -o -name "*.dtbo" \) \
              -exec cp {} AnyKernel3/ \; 2>/dev/null || true
            [ -f "$KERNEL_DIR/out/arch/arm64/boot/dtbo.img" ] && \
              cp "$KERNEL_DIR/out/arch/arm64/boot/dtbo.img" AnyKernel3/ 2>/dev/null || true
            [ -f "$KERNEL_DIR/out/arch/arm64/boot/dtb.img" ] && \
              cp "$KERNEL_DIR/out/arch/arm64/boot/dtb.img" AnyKernel3/ 2>/dev/null || true
            chmod 755 AnyKernel3/tools/*
            cd AnyKernel3
            zip -r9 "$PROJECT_DIR/$ZIP_NAME" . \
              -x ".git*" "patch/*" "ramdisk/*" "split_img/*"
            cd "$PROJECT_DIR"
            echo ""
            echo "=== ZIP Package ==="
            ls -lh "$ZIP_NAME"
      - store_artifacts:
          path: /tmp/infinity-kernel-build/InfinityKernel-v1.0.23-vayu.zip
          destination: InfinityKernel-v1.0.23-vayu.zip
      - persist_to_workspace:
          root: /tmp/infinity-kernel-build
          paths:
            - InfinityKernel-v1.0.23-vayu.zip

workflows:
  build-kernel:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
                - master
                - dev