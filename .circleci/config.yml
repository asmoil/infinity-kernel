# Infinity Kernel v1.0.21
# Poco X3 Pro (vayu/bhima) | SM8250-AC (Snapdragon 860) | Linux 4.14
# Proton Clang 17 | AnyKernel3 | MIT License
version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    steps:
      - checkout

      # ── Шаг 1: Установка зависимостей ──────────────────────────
      - run:
          name: "Установка зависимостей"
          command: |
            apt-get update
            apt-get install -y \
              bc bison build-essential ccache curl flex \
              git gnupg gperf imagemagick \
              libelf-dev liblz4-tool libncurses5-dev \
              libssl-dev libxml2 libxml2-utils lzop \
              rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
              gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
              python-is-python3

      # ── Шаг 2: Клонирование Proton Clang 17 + подготовка bin ───
      - run:
          name: "Клонирование Proton Clang 17"
          command: |
            CLANG_DIR="/tmp/infinity-kernel-build/proton-clang"
            if [ ! -d "$CLANG_DIR" ]; then
              mkdir -p /tmp/infinity-kernel-build
              git clone https://github.com/kdrag0n/proton-clang "$CLANG_DIR"
            fi

            # === Подготовка bin/ directory ===
            # 1. Удаляем x86_64 GNU as — Clang 17 использует integrated assembler
            rm -f "$CLANG_DIR/bin/as"

            # 2. Удаляем x86_64 GNU ld (если есть) — он не умеет arm64
            #    и создаём symlink ld → ld.lld (LLVM linker, поддерживает arm64)
            if [ -e "$CLANG_DIR/bin/ld" ]; then
              rm -f "$CLANG_DIR/bin/ld"
            fi
            ln -sf ld.lld "$CLANG_DIR/bin/ld"

            # 3. Создаём symlinks clang-13, clang-14, ... → clang
            #    VDSO Makefile в ядре Xiaomi вызывает clang-13 напрямую
            for v in 13 14 15 16 17; do
              ln -sf clang "$CLANG_DIR/bin/clang-$v"
            done

            echo "=== Проверка инструментов ==="
            echo "clang:   $(ls -la "$CLANG_DIR/bin/clang")"
            echo "clang-13: $(ls -la "$CLANG_DIR/bin/clang-13")"
            echo "ld:      $(ls -la "$CLANG_DIR/bin/ld")"
            echo "ld.lld:  $(ls -la "$CLANG_DIR/bin/ld.lld")"
            echo "============================="

      # ── Шаг 3: Определение SRC_ROOT ────────────────────────────
      - run:
          name: "Определение SRC_ROOT"
          command: |
            if [ -f "arch/arm64/configs/infinity_defconfig" ]; then
              echo 'export SRC_ROOT="."' >> "$BASH_ENV"
            elif [ -d "infinity-kernel" ] && [ -f "infinity-kernel/arch/arm64/configs/infinity_defconfig" ]; then
              echo 'export SRC_ROOT="infinity-kernel"' >> "$BASH_ENV"
            else
              echo "FATAL: infinity_defconfig не найден"
              find . -name "infinity_defconfig" 2>/dev/null || true
              exit 1
            fi
            echo "SRC_ROOT=$SRC_ROOT"

      # ── Шаг 4: Клонирование исходников ядра ────────────────────
      - run:
          name: "Клонирование исходников ядра (vayu-r-oss)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            if [ ! -d "$KERNEL_SRC/.git" ]; then
              git clone --depth=1 --branch vayu-r-oss \
                https://github.com/negrroo/Xiaomi_Kernel_OpenSource \
                "$KERNEL_SRC"
            fi
            echo "KERNEL_SRC=$KERNEL_SRC"

      # ── Шаг 5: Копирование файлов проекта в исходники ──────────
      - run:
          name: "Копирование infinity kernel файлов"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            echo "SRC_ROOT=$SRC_ROOT"

            cp -rv "$SRC_ROOT/arch/arm64/configs/infinity_defconfig" \
                    "$KERNEL_SRC/arch/arm64/configs/infinity_defconfig"

            if [ -d "$SRC_ROOT/drivers/charging" ]; then
              cp -rv "$SRC_ROOT/drivers/charging" "$KERNEL_SRC/drivers/charging"
            fi
            if ! grep -q "source \"drivers/charging/Kconfig\"" "$KERNEL_SRC/drivers/Kconfig" 2>/dev/null; then
              echo 'source "drivers/charging/Kconfig"' >> "$KERNEL_SRC/drivers/Kconfig"
            fi
            if ! grep -q "obj-\$(CONFIG_CHARGING_CONTROL)" "$KERNEL_SRC/drivers/Makefile" 2>/dev/null; then
              echo 'obj-$(CONFIG_CHARGING_CONTROL)      += charging/' >> "$KERNEL_SRC/drivers/Makefile"
            fi

            if [ -d "$SRC_ROOT/patches" ]; then
              cp -rv "$SRC_ROOT/patches" "$KERNEL_SRC/patches"
            fi

            echo "Файлы скопированы."

      # ── Шаг 6: Конфигурация ───────────────────────────────────
      - run:
          name: "Конфигурация ядра (defconfig + merge + sed fixes)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            make ARCH=arm64 vayu_user_defconfig O=out

            scripts/kconfig/merge_config.sh -m out/.config \
              arch/arm64/configs/infinity_defconfig || true

            make ARCH=arm64 olddefconfig O=out </dev/null || true

            # Отключение Clang-несовместимых подсистем
            for cfg in \
              CONFIG_STAGING CONFIG_SOUND CONFIG_SND CONFIG_RC_CORE \
              CONFIG_MEDIA_SUPPORT CONFIG_FB CONFIG_VT CONFIG_VHOST \
              CONFIG_COMEDI CONFIG_AGP CONFIG_INFINIBAND; do
              sed -i "s/^${cfg}=y/# ${cfg} is not set/" out/.config
              sed -i "s/^${cfg}=m/# ${cfg} is not set/" out/.config
            done

            # Отключение stack-protector (Clang 17 не поддерживает)
            sed -i 's/CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/' out/.config
            sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' out/.config
            grep -q "^CONFIG_CC_STACKPROTECTOR_NONE=y" out/.config || \
              echo "CONFIG_CC_STACKPROTECTOR_NONE=y" >> out/.config

            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "Конфигурация готова."

      # ── Шаг 7: Патчи OpenSSL 3.0 ──────────────────────────────
      - run:
          name: "Патчи OpenSSL 3.0 (Ubuntu 22.04)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            if [ -f "$KERNEL_SRC/certs/extract-cert.c" ]; then
              sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' \
                "$KERNEL_SRC/certs/extract-cert.c"
            fi
            if [ -f "$KERNEL_SRC/scripts/sign-file.c" ]; then
              sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' \
                "$KERNEL_SRC/scripts/sign-file.c"
            fi
            echo "OpenSSL патчи применены."

      # ── Шаг 8: Применение исходных патчей + SUFS ──────────────
      - run:
          name: "Применение патчей (apply_all.sh) + SUFS"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            if [ -f patches/apply_all.sh ]; then
              bash patches/apply_all.sh
            fi

            if grep -q "CONFIG_SUFS_FS" out/.config 2>/dev/null; then
              echo "SUFS_FS уже в .config"
            else
              if find . -name "Kconfig.sufs" -o -name "Kconfig.susfs" 2>/dev/null | head -1 | grep -q .; then
                echo "CONFIG_SUFS_FS=y" >> out/.config
                echo "CONFIG_SUFS=y" >> out/.config
                echo "SUFS_FS добавлен в .config"
              fi
            fi

            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "Патчи применены."

      # ── Шаг 9: Очистка исходного дерева ────────────────────────
      - run:
          name: "Очистка исходного дерева (is not clean fix)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"
            rm -f .config
            rm -rf include/config
            echo "Исходное дерево очищено."

      # ── Шаг 10: Сборка ядра ────────────────────────────────────
      - run:
          name: "Сборка Infinity Kernel"
          no_output_timeout: 30m
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            CLANG_DIR="/tmp/infinity-kernel-build/proton-clang"
            cd "$KERNEL_SRC"

            # proton-clang/bin в начало PATH
            export PATH="$CLANG_DIR/bin:$PATH"
            echo "clang:   $(which clang) -> $(clang --version 2>&1 | head -1)"
            echo "clang-13: $(which clang-13) -> $(clang-13 --version 2>&1 | head -1)"
            echo "ld:      $(which ld) -> $(ld --version 2>&1 | head -1)"

            # Общие флаги для обоих фаз
            COMMON_MAKE="O=out \
              ARCH=arm64 \
              CC=$CLANG_DIR/bin/clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
              LD=$CLANG_DIR/bin/ld.lld \
              AR=$CLANG_DIR/bin/llvm-ar \
              NM=$CLANG_DIR/bin/llvm-nm \
              OBJCOPY=$CLANG_DIR/bin/llvm-objcopy \
              OBJDUMP=$CLANG_DIR/bin/llvm-objdump \
              STRIP=$CLANG_DIR/bin/llvm-strip \
              HOSTCC=gcc \
              HOSTCFLAGS=\"-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error\""

            # ── Фаза 1: scripts (однопоточно) ──
            echo "=========================================="
            echo "  ФАЗА 1: Сборка scripts"
            echo "=========================================="
            eval make $COMMON_MAKE -j1 scripts 2>&1 | tee /tmp/scripts_build.log
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo "ОШИБКА SCRIPTS:"; tail -60 /tmp/scripts_build.log; exit 1
            fi
            echo "ФАЗА 1: OK"

            # ── Фаза 2: ядро (параллельно) ──
            echo "=========================================="
            echo "  ФАЗА 2: Сборка ядра (-j$(nproc))"
            echo "=========================================="
            eval make $COMMON_MAKE \
              KCFLAGS="-Wno-error" \
              -j$(nproc) Image.gz-dtb dtbs 2>&1 | tee /tmp/kernel_build.log

            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo ""
              echo "=========================================="
              echo "  ОШИБКА В СБОРКЕ ЯДРА"
              echo "=========================================="
              grep -E "error:" /tmp/kernel_build.log | head -30
              echo "--- Последние 60 строк ---"
              tail -60 /tmp/kernel_build.log
              exit 1
            fi

      # ── Шаг 11: Проверка и упаковка ───────────────────────────
      - run:
          name: "Проверка Image.gz-dtb и упаковка AnyKernel3 ZIP"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            IMG="$KERNEL_SRC/out/arch/arm64/boot/Image.gz-dtb"

            if [ ! -f "$IMG" ]; then
              echo "ОШИБКА: Image.gz-dtb не собрался!"
              ls -la "$KERNEL_SRC/out/arch/arm64/boot/" 2>/dev/null || echo "boot dir не существует"
              exit 1
            fi

            echo "Image.gz-dtb: $(du -sh "$IMG" | cut -f1)"

            if [ -d "AnyKernel3" ]; then
              cp -v "$IMG" AnyKernel3/
              cd AnyKernel3
              zip -r9 /tmp/infinity-kernel-v1.0.21.zip *
              echo "ZIP: /tmp/infinity-kernel-v1.0.21.zip ($(du -sh /tmp/infinity-kernel-v1.0.21.zip | cut -f1))"
            elif [ -n "${SRC_ROOT:-}" ] && [ -d "$SRC_ROOT/AnyKernel3" ]; then
              cp -v "$IMG" "$SRC_ROOT/AnyKernel3/"
              cd "$SRC_ROOT/AnyKernel3"
              zip -r9 /tmp/infinity-kernel-v1.0.21.zip *
              echo "ZIP: /tmp/infinity-kernel-v1.0.21.zip ($(du -sh /tmp/infinity-kernel-v1.0.21.zip | cut -f1))"
            else
              echo "ОШИБКА: AnyKernel3 директория не найдена"
              exit 1
            fi

      - store_artifacts:
          path: /tmp/infinity-kernel-v1.0.21.zip
          destination: infinity-kernel-v1.0.21.zip

workflows:
  infinity_build:
    jobs:
      - build