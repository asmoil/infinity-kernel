# Infinity Kernel v1.0.34
# Poco X3 Pro (vayu/bhima) | SM8250-AC (Snapdragon 860) | Linux 4.14
# Proton Clang 17 | AnyKernel3 | MIT License
#
# v1.0.34 fix:
#   - Fixed circular symlink: 'clang' is itself a symlink to 'clang-13'
#     (real binary). Old code did ln -sf clang clang-13, creating
#     clang-13 → clang → clang-13 (infinite loop). Now uses
#     readlink -f to find the real binary and symlinks point to it.
#   - v1.0.33 fixes preserved (bash local fix, CC_STACKPROTECTOR_NONE).
#   - v1.0.32 fixes preserved (MiCode repo, PROTECTED_CFGS).
version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    steps:
      - checkout

      # ── Шаг 1: Установка зависимостей ──────────────────────────
      - run:
          name: "Установка зависимостей"
          command: |
            apt-get update
            apt-get install -y \
              bc bison build-essential ccache curl flex \
              git gnupg gperf imagemagick \
              libelf-dev liblz4-tool libncurses5-dev \
              libssl-dev libxml2 libxml2-utils lzop \
              rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
              gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
              python-is-python3

      # ── Шаг 2: Клонирование Proton Clang 17 + подготовка bin ───
      - run:
          name: "Клонирование Proton Clang 17"
          command: |
            CLANG_DIR="/tmp/infinity-kernel-build/proton-clang"
            if [ ! -d "$CLANG_DIR" ]; then
              mkdir -p /tmp/infinity-kernel-build
              git clone https://github.com/kdrag0n/proton-clang "$CLANG_DIR"
            fi

            # === Подготовка bin/ directory ===
            # 1. Удаляем x86_64 GNU as — Clang 17 использует integrated assembler
            rm -f "$CLANG_DIR/bin/as"

            # 2. Удаляем x86_64 GNU ld (если есть) — он не умеет arm64
            #    и создаём symlink ld → ld.lld (LLVM linker, поддерживает arm64)
            if [ -e "$CLANG_DIR/bin/ld" ]; then
              rm -f "$CLANG_DIR/bin/ld"
            fi
            ln -sf ld.lld "$CLANG_DIR/bin/ld"

            # 3. Создаём symlinks для версий clang, которые ядро вызывает напрямую
            #    (VDSO Makefile вызывает clang-13 и т.д.)
            #    ВАЖНО: clang сам является symlink → clang-13 (реальный бинарник).
            #    Если сделать ln -sf clang clang-13, получится КРУГОВОЙ symlink:
            #      clang → clang-13 → clang → clang-13 → ...
            #    Поэтому все symlinks должны указывать на РЕАЛЬНЫЙ бинарник,
            #    а не на symlink 'clang'.
            REAL_CLANG=$(readlink -f "$CLANG_DIR/bin/clang")
            echo "Real clang binary: $REAL_CLANG"
            for v in 13 14 15 16 17; do
              if [ "$CLANG_DIR/bin/clang-$v" = "$REAL_CLANG" ]; then
                echo "  clang-$v is the real binary, skipping"
                continue
              fi
              ln -sf "$REAL_CLANG" "$CLANG_DIR/bin/clang-$v"
            done

            echo "=== Проверка инструментов ==="
            echo "clang:     $(ls -la "$CLANG_DIR/bin/clang")"
            echo "real:      $REAL_CLANG"
            echo "clang-13:  $(ls -la "$CLANG_DIR/bin/clang-13")"
            echo "clang-17:  $(ls -la "$CLANG_DIR/bin/clang-17")"
            echo "ld:        $(ls -la "$CLANG_DIR/bin/ld")"
            echo "ld.lld:    $(ls -la "$CLANG_DIR/bin/ld.lld")"
            echo "============================="

      # ── Шаг 3: Определение SRC_ROOT ────────────────────────────
      - run:
          name: "Определение SRC_ROOT"
          command: |
            if [ -f "arch/arm64/configs/infinity_defconfig" ]; then
              echo 'export SRC_ROOT="."' >> "$BASH_ENV"
            elif [ -d "infinity-kernel" ] && [ -f "infinity-kernel/arch/arm64/configs/infinity_defconfig" ]; then
              echo 'export SRC_ROOT="infinity-kernel"' >> "$BASH_ENV"
            else
              echo "FATAL: infinity_defconfig не найден"
              find . -name "infinity_defconfig" 2>/dev/null || true
              exit 1
            fi
            echo "SRC_ROOT=$SRC_ROOT"

      # ── Шаг 4: Клонирование исходников ядра ────────────────────
      - run:
          name: "Клонирование исходников ядра (vayu-r-oss)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            if [ ! -d "$KERNEL_SRC/.git" ]; then
              git clone --depth=1 --branch vayu-r-oss \
                https://github.com/MiCode/Xiaomi_Kernel_OpenSource \
                "$KERNEL_SRC"
            fi
            echo "KERNEL_SRC=$KERNEL_SRC"

      # ── Шаг 5: Копирование файлов проекта в исходники ──────────
      - run:
          name: "Копирование infinity kernel файлов"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            echo "SRC_ROOT=$SRC_ROOT"

            cp -rv "$SRC_ROOT/arch/arm64/configs/infinity_defconfig" \
                    "$KERNEL_SRC/arch/arm64/configs/infinity_defconfig"

            if [ -d "$SRC_ROOT/drivers/charging" ]; then
              cp -rv "$SRC_ROOT/drivers/charging" "$KERNEL_SRC/drivers/charging"
            fi
            if ! grep -q "source \"drivers/charging/Kconfig\"" "$KERNEL_SRC/drivers/Kconfig" 2>/dev/null; then
              echo 'source "drivers/charging/Kconfig"' >> "$KERNEL_SRC/drivers/Kconfig"
            fi
            if ! grep -q "obj-\$(CONFIG_CHARGING_CONTROL)" "$KERNEL_SRC/drivers/Makefile" 2>/dev/null; then
              echo 'obj-$(CONFIG_CHARGING_CONTROL)      += charging/' >> "$KERNEL_SRC/drivers/Makefile"
            fi

            if [ -d "$SRC_ROOT/patches" ]; then
              cp -rv "$SRC_ROOT/patches" "$KERNEL_SRC/patches"
            fi

            echo "Файлы скопированы."

      # ── Шаг 6: Конфигурация (defconfig + merge + triple disable + HIDDEN_CFGS) ──
      - run:
          name: "Конфигурация ядра (defconfig + merge + triple disable + HIDDEN_CFGS)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            # ═══════════════════════════════════════════════════════
            # PROTECTED_CFGS — конфиги, которые НИКОГДА нельзя отключать
            # Контролируют Makefile obj-$(CONFIG_X) компиляцию целых .c
            # файлов, или являются Kconfig choice members.
            # HIDDEN_CFGS sed-подход для них НЕ РАБОТАЕТ.
            # ═══════════════════════════════════════════════════════
            PROTECTED_CFGS="CONFIG_NO_HZ_COMMON CONFIG_NO_HZ_IDLE CONFIG_VIRT_CPU_ACCOUNTING_GEN CONFIG_CONTEXT_TRACKING CONFIG_NO_HZ CONFIG_HZ_PERIODIC CONFIG_NO_HZ_FULL CONFIG_CPUSETS"

            # Конфиги для отключения (Clang-несовместимые / ненужные на телефоне)
            DISABLE_LIST="CONFIG_STAGING CONFIG_SOUND CONFIG_SND CONFIG_RC_CORE \
              CONFIG_MEDIA_SUPPORT CONFIG_FB CONFIG_VT CONFIG_VHOST \
              CONFIG_COMEDI CONFIG_AGP CONFIG_INFINIBAND"

            # ── 1) Base defconfig ──
            make ARCH=arm64 vayu_user_defconfig O=out

            # ── 2) Merge infinity_defconfig fragment ──
            scripts/kconfig/merge_config.sh -O out/ out/.config \
              arch/arm64/configs/infinity_defconfig || true

            # ── 3) First olddefconfig (resolve after merge) ──
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            # ═══════════════════════════════════════════════════════
            # Тройной проход отключения (triple disable pass)
            # Каждый проход: disable → olddefconfig → disable → olddefconfig
            # PROTECTED_CFGS исключены из отключения
            # ═══════════════════════════════════════════════════════

            disable_cfgs() {
              for cfg in $DISABLE_LIST; do
                # Skip protected configs
                local skip=0
                for p in $PROTECTED_CFGS; do
                  if [ "$cfg" = "$p" ]; then skip=1; break; fi
                done
                [ "$skip" = "1" ] && continue
                sed -i "s/^${cfg}=y/# ${cfg} is not set/" out/.config
                sed -i "s/^${cfg}=m/# ${cfg} is not set/" out/.config
              done
              # CC stackprotector (Clang 17 не поддерживает)
              sed -i 's/^CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/' out/.config
              sed -i 's/^CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' out/.config
              sed -i '/^CONFIG_CC_STACKPROTECTOR_NONE/d' out/.config
              echo "CONFIG_CC_STACKPROTECTOR_NONE=y" >> out/.config
            }

            echo "  [1/6] First disable pass..."
            disable_cfgs
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "  [2/6] Second disable pass (catch re-enabled)..."
            disable_cfgs
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "  [3/6] Third disable pass (sed kill)..."
            _skip=0
            for cfg in $DISABLE_LIST; do
              _skip=0
              for p in $PROTECTED_CFGS; do
                if [ "$cfg" = "$p" ]; then _skip=1; break; fi
              done
              [ "$_skip" = "1" ] && continue
              sed -i "/^${cfg}=/d" out/.config
              if ! grep -q "^# ${cfg} is not set" out/.config; then
                echo "# ${cfg} is not set" >> out/.config
              fi
            done
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            # ═══════════════════════════════════════════════════════
            # HIDDEN_CFGS — конфиги, которые были отключены cascade
            # через olddefconfig, но нужны для #ifdef-protected кода
            # в .c/.h файлах. Подход работает ТОЛЬКО для
            # #ifdef-защищённых символов, НЕ для Makefile obj-$(CONFIG_X)
            # и НЕ для Kconfig choice members.
            #
            # ВАЖНО: CONFIG_NO_HZ_COMMON и CONFIG_VIRT_CPU_ACCOUNTING_GEN
            # ЗДЕСЬ НЕТ — они в PROTECTED_CFGS (никогда не отключаются).
            # ═══════════════════════════════════════════════════════
            HIDDEN_CFGS="CONFIG_SCHED_INFO CONFIG_PINCTRL CONFIG_POSIX_TIMERS CONFIG_RTC_CLASS CONFIG_SCHED_WALT CONFIG_DEBUG_REGULATOR"

            # ── 4) Compile scripts (generates auto.conf via silentoldconfig) ──
            echo "  [4/6] Compiling scripts (generates auto.conf)..."
            make ARCH=arm64 O=out -j1 scripts 2>&1 | tail -5 || true

            # ── 5) Triple patch: .config + auto.conf + autoconf.h ──
            echo "  [5/6] Patching HIDDEN_CFGS in .config + auto.conf + autoconf.h..."
            for cfg in $HIDDEN_CFGS; do
              # Patch .config
              if ! grep -q "^${cfg}=y" out/.config; then
                sed -i "/^# ${cfg} is not set/d" out/.config
                echo "${cfg}=y" >> out/.config
              fi
              # Patch auto.conf
              if [ -f out/include/config/auto.conf ]; then
                if ! grep -q "^${cfg}=y" out/include/config/auto.conf; then
                  sed -i "/^${cfg}=/d" out/include/config/auto.conf
                  echo "${cfg}=y" >> out/include/config/auto.conf
                fi
              fi || true
              # Patch autoconf.h
              if [ -f out/include/generated/autoconf.h ]; then
                if ! grep -q "#define ${cfg} 1" out/include/generated/autoconf.h; then
                  sed -i "/#define ${cfg} /d" out/include/generated/autoconf.h
                  echo "#define ${cfg} 1" >> out/include/generated/autoconf.h
                fi
              fi || true
            done

            # Verify HIDDEN_CFGS
            echo "  [6/6] Verifying HIDDEN_CFGS..."
            for cfg in $HIDDEN_CFGS; do
              if grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                echo "  OK:   ${cfg}"
              else
                echo "  FAIL: ${cfg} NOT in .config!"
              fi
            done

            # Verify PROTECTED_CFGS are still enabled
            echo "  Verifying PROTECTED_CFGS..."
            for cfg in $PROTECTED_CFGS; do
              if grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                echo "  OK:   ${cfg}=y"
              elif grep -q "^# ${cfg} is not set" out/.config 2>/dev/null; then
                echo "  WARN: ${cfg} is not set — was disabled by cascade!"
              else
                echo "  INFO: ${cfg} not in .config (may be selected)"
              fi
            done

            # NR_CPUS check
            echo "  NR_CPUS: $(grep 'CONFIG_NR_CPUS' out/.config | head -1)"

            # Touch auto.conf to make it newer than .config
            # This prevents silentoldconfig from overwriting our patches
            touch out/include/config/auto.conf out/include/generated/autoconf.h 2>/dev/null || true

            echo "Конфигурация готова."

      # ── Шаг 7: Патчи OpenSSL 3.0 ──────────────────────────────
      - run:
          name: "Патчи OpenSSL 3.0 (Ubuntu 22.04)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            if [ -f "$KERNEL_SRC/certs/extract-cert.c" ]; then
              sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' \
                "$KERNEL_SRC/certs/extract-cert.c"
            fi
            if [ -f "$KERNEL_SRC/scripts/sign-file.c" ]; then
              sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' \
                "$KERNEL_SRC/scripts/sign-file.c"
            fi
            echo "OpenSSL патчи применены."

      # ── Шаг 8: Применение исходных патчей + SUFS ──────────────
      - run:
          name: "Применение патчей (apply_all.sh) + SUFS"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            if [ -f patches/apply_all.sh ]; then
              bash patches/apply_all.sh .
            fi

            if grep -q "CONFIG_SUFS_FS" out/.config 2>/dev/null; then
              echo "SUFS_FS уже в .config"
            else
              if find . -name "Kconfig.sufs" -o -name "Kconfig.susfs" 2>/dev/null | head -1 | grep -q .; then
                echo "CONFIG_SUFS_FS=y" >> out/.config
                echo "CONFIG_SUFS=y" >> out/.config
                echo "SUFS_FS добавлен в .config"
              fi
            fi

            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "Патчи применены."

      # ── Шаг 9: Очистка исходного дерева ────────────────────────
      - run:
          name: "Очистка исходного дерева (is not clean fix)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"
            rm -f .config
            rm -rf include/config
            echo "Исходное дерево очищено."

      # ── Шаг 10: Сборка ядра (3 sub-phases) ────────────────────
      - run:
          name: "Сборка Infinity Kernel"
          no_output_timeout: 30m
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            CLANG_DIR="/tmp/infinity-kernel-build/proton-clang"
            cd "$KERNEL_SRC"

            # proton-clang/bin в начало PATH
            export PATH="$CLANG_DIR/bin:$PATH"
            echo "clang:   $(which clang) -> $(clang --version 2>&1 | head -1)"
            echo "clang-13: $(which clang-13) -> $(clang-13 --version 2>&1 | head -1)"
            echo "ld:      $(which ld) -> $(ld --version 2>&1 | head -1)"

            # Общие флаги
            COMMON_MAKE="O=out \
              ARCH=arm64 \
              CC=$CLANG_DIR/bin/clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
              LD=$CLANG_DIR/bin/ld.lld \
              AR=$CLANG_DIR/bin/llvm-ar \
              NM=$CLANG_DIR/bin/llvm-nm \
              OBJCOPY=$CLANG_DIR/bin/llvm-objcopy \
              OBJDUMP=$CLANG_DIR/bin/llvm-objdump \
              STRIP=$CLANG_DIR/bin/llvm-strip \
              HOSTCC=gcc \
              HOSTCFLAGS=\"-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error\""

            # ═══════════════════════════════════════════════════════
            # Phase 2a: Regenerate auto.conf via olddefconfig
            # Step 9 cleaned source tree but out/include/config/
            # (containing auto.conf) was NOT cleaned (O=out隔离).
            # We re-run olddefconfig to sync .config after Step 8's
            # olddefconfig, then verify auto.conf exists.
            # ═══════════════════════════════════════════════════════
            echo "=== Phase 2a: Regenerating auto.conf via olddefconfig ==="
            make ARCH=arm64 O=out olddefconfig </dev/null 2>&1 || true

            if [ -f out/include/config/auto.conf ]; then
              echo "auto.conf exists: $(ls -la out/include/config/auto.conf)"
            else
              echo "auto.conf NOT found — regenerating via make scripts..."
              eval make $COMMON_MAKE -j1 scripts 2>&1 | tail -10 || true
            fi

            if [ -f out/include/generated/autoconf.h ]; then
              echo "autoconf.h exists: $(ls -la out/include/generated/autoconf.h)"
            fi

            # ═══════════════════════════════════════════════════════
            # Phase 2b: Patch hidden configs in auto.conf + autoconf.h
            # These configs were set in .config (Step 6) but
            # olddefconfig/Step 8 may have affected auto.conf.
            # Re-apply to ensure consistency.
            #
            # ВАЖНО: NO_HZ_COMMON и VIRT_CPU_ACCOUNTING_GEN ЗДЕСЬ НЕТ.
            # Они в PROTECTED_CFGS — никогда не отключались, поэтому
            # auto.conf уже содержит правильные значения от olddefconfig.
            # ═══════════════════════════════════════════════════════
            echo "=== Phase 2b: Patching hidden configs in auto.conf + autoconf.h ==="

            HIDDEN_CFGS="CONFIG_SCHED_INFO CONFIG_PINCTRL CONFIG_POSIX_TIMERS CONFIG_RTC_CLASS CONFIG_SCHED_WALT CONFIG_DEBUG_REGULATOR"

            for cfg in $HIDDEN_CFGS; do
              # Patch .config
              if ! grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                sed -i "/^# ${cfg} is not set/d" out/.config 2>/dev/null || true
                echo "${cfg}=y" >> out/.config
              fi
              # Patch auto.conf
              if [ -f out/include/config/auto.conf ]; then
                if ! grep -q "^${cfg}=y" out/include/config/auto.conf; then
                  sed -i "/^${cfg}=/d" out/include/config/auto.conf
                  echo "${cfg}=y" >> out/include/config/auto.conf
                fi
              fi || true
              # Patch autoconf.h
              if [ -f out/include/generated/autoconf.h ]; then
                if ! grep -q "#define ${cfg} 1" out/include/generated/autoconf.h; then
                  sed -i "/#define ${cfg} /d" out/include/generated/autoconf.h
                  echo "#define ${cfg} 1" >> out/include/generated/autoconf.h
                fi
              fi || true
            done

            # Verify patches
            echo "=== Verifying hidden config patches ==="
            for cfg in $HIDDEN_CFGS; do
              if grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                echo "OK:   ${cfg}"
              else
                echo "WARN: ${cfg} missing from .config"
              fi
            done
            # Verify PROTECTED_CFGS
            echo "NR_CPUS: $(grep 'CONFIG_NR_CPUS' out/.config | head -1)"
            for pcfg in CONFIG_NO_HZ_COMMON CONFIG_VIRT_CPU_ACCOUNTING_GEN CONFIG_CONTEXT_TRACKING; do
              if grep -q "^${pcfg}=y" out/.config 2>/dev/null; then
                echo "OK:   ${pcfg}=y (protected)"
              elif grep -q "^# ${pcfg} is not set" out/.config 2>/dev/null; then
                echo "FAIL: ${pcfg} is not set! PROTECTED config was disabled!"
              else
                echo "INFO: ${pcfg} not explicitly in .config (may be selected implicitly)"
              fi
            done

            # Touch auto.conf newer than .config to prevent silentoldconfig overwrite
            touch out/include/config/auto.conf out/include/generated/autoconf.h 2>/dev/null || true

            # ═══════════════════════════════════════════════════════
            # Phase 2c: Build kernel (parallel)
            # ═══════════════════════════════════════════════════════
            echo "=== Phase 2c: Building kernel (parallel, -j$(nproc)) ==="
            set -o pipefail

            eval make $COMMON_MAKE \
              KCFLAGS="-Wno-error" \
              -j$(nproc) Image.gz-dtb dtbs 2>&1 | tee /tmp/kernel_build.log

            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo ""
              echo "=========================================="
              echo "  ОШИБКА В СБОРКЕ ЯДРА"
              echo "=========================================="
              grep -E "error:" /tmp/kernel_build.log | head -30
              echo "--- Последние 80 строк ---"
              tail -80 /tmp/kernel_build.log
              exit 1
            fi

      # ── Шаг 11: Проверка и упаковка ───────────────────────────
      - run:
          name: "Проверка Image.gz-dtb и упаковка AnyKernel3 ZIP"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            IMG="$KERNEL_SRC/out/arch/arm64/boot/Image.gz-dtb"

            if [ ! -f "$IMG" ]; then
              echo "ОШИБКА: Image.gz-dtb не собрался!"
              ls -la "$KERNEL_SRC/out/arch/arm64/boot/" 2>/dev/null || echo "boot dir не существует"
              exit 1
            fi

            echo "Image.gz-dtb: $(du -sh "$IMG" | cut -f1)"

            if [ -d "AnyKernel3" ]; then
              cp -v "$IMG" AnyKernel3/
              cd AnyKernel3
              zip -r9 /tmp/infinity-kernel-v1.0.34.zip *
              echo "ZIP: /tmp/infinity-kernel-v1.0.34.zip ($(du -sh /tmp/infinity-kernel-v1.0.34.zip | cut -f1))"
            elif [ -n "${SRC_ROOT:-}" ] && [ -d "$SRC_ROOT/AnyKernel3" ]; then
              cp -v "$IMG" "$SRC_ROOT/AnyKernel3/"
              cd "$SRC_ROOT/AnyKernel3"
              zip -r9 /tmp/infinity-kernel-v1.0.34.zip *
              echo "ZIP: /tmp/infinity-kernel-v1.0.34.zip ($(du -sh /tmp/infinity-kernel-v1.0.34.zip | cut -f1))"
            else
              echo "ОШИБКА: AnyKernel3 директория не найдена"
              exit 1
            fi

      - store_artifacts:
          path: /tmp/infinity-kernel-v1.0.34.zip
          destination: infinity-kernel-v1.0.34.zip

workflows:
  infinity_build:
    jobs:
      - build