version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    resource_class: large
    working_directory: /tmp/infinity-kernel-build
    steps:
      - run:
          name: "Infinity Kernel v1.0.7 - Install dependencies"
          command: |
            apt update && apt install -y \
              bc bison build-essential ccache curl flex \
              g++-multilib gcc-multilib git gnupg gperf \
              imagemagick lib32ncurses5-dev lib32readline-dev \
              lib32z1-dev libelf-dev liblz4-tool libncurses5-dev \
              libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
              lzop pngcrush rsync schedtool squashfs-tools \
              xsltproc zip zlib1g-dev python3

      - run:
          name: "Clone Proton Clang 17"
          command: |
            git clone --depth=1 https://github.com/kdrag0n/proton-clang.git proton-clang

      - run:
          name: "Fix Proton Clang host tools (LLVM as != GNU as)"
          command: |
            cd proton-clang/bin
            for tool in as nm ar ranlib objcopy objdump strip; do
              if [ -f "$tool" ]; then
                mv "$tool" "${tool}.llvm"
              fi
            done
            ls -la *.llvm 2>/dev/null || echo "Host tools renamed"
            # Verify no conflicting GNU-as remains
            ! command -v ./as 2>/dev/null || echo "WARNING: as still exists"

      - run:
          name: "Clone Xiaomi kernel source (vayu-r-oss)"
          command: |
            git clone --depth=1 -b vayu-r-oss \
              https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git kernel_src

      - run:
          name: "Copy Infinity Kernel patches and configs"
          command: |
            # Copy defconfig fragment
            mkdir -p kernel_src/arch/arm64/configs
            cp -f arch/arm64/configs/infinity_defconfig kernel_src/arch/arm64/configs/
            # Copy charging driver
            mkdir -p kernel_src/drivers/charging
            cp -f drivers/charging/infinity_charging_control.c kernel_src/drivers/charging/
            cp -f drivers/charging/Kconfig kernel_src/drivers/charging/
            cp -f drivers/charging/Makefile kernel_src/drivers/charging/
            # Copy header
            mkdir -p kernel_src/include/linux
            cp -f include/linux/infinity_charging_control.h kernel_src/include/linux/
            # Copy DTS
            mkdir -p kernel_src/scripts/charging_bypass
            cp -f scripts/charging_bypass/infinity_charging.dts kernel_src/scripts/charging_bypass/
            # Copy patch script
            mkdir -p kernel_src/patches
            cp -f patches/apply_all.sh kernel_src/patches/
            echo "Source files copied"

      - run:
          name: "Generate base config (vayu_user_defconfig)"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            # Verify the defconfig exists
            ls -la arch/arm64/configs/vayu_user_defconfig
            # Generate .config from the REAL device defconfig
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
              vayu_user_defconfig O=out
            echo "Base .config generated from vayu_user_defconfig"

      - run:
          name: "Merge Infinity Kernel defconfig fragment"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            # Merge our infinity_defconfig fragment ON TOP of the base config
            scripts/kconfig/merge_config.sh -m out/.config \
              arch/arm64/configs/infinity_defconfig \
              || true
            # Copy merged config back for make to use
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
              olddefconfig O=out
            echo "Infinity defconfig merged"

      - run:
          name: "Disable Clang-incompatible subsystems"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            CONF="out/.config"
            # Remove configs for subsystems that don't compile with Clang 17 on 4.14
            sed -i '/CONFIG_STAGING=/d' "$CONF"
            sed -i '/CONFIG_SND=/d' "$CONF"
            sed -i '/CONFIG_SOUND=/d' "$CONF"
            sed -i '/CONFIG_RC_CORE=/d' "$CONF"
            sed -i '/CONFIG_MEDIA_RC_SUPPORT=/d' "$CONF"
            sed -i '/CONFIG_LIRC=/d' "$CONF"
            sed -i '/CONFIG_V4L_PLATFORM_DRIVERS=/d' "$CONF"
            sed -i '/CONFIG_V4L_MEM2MEM_DRIVERS=/d' "$CONF"
            sed -i '/CONFIG_RADIO_ADAPTERS=/d' "$CONF"
            sed -i '/CONFIG_VIDEO_DEV=/d' "$CONF"
            sed -i '/CONFIG_FB=/d' "$CONF"
            sed -i '/CONFIG_VT=/d' "$CONF"
            sed -i '/CONFIG_VHOST=/d' "$CONF"
            sed -i '/CONFIG_COMEDI=/d' "$CONF"
            sed -i '/CONFIG_AGP=/d' "$CONF"
            sed -i '/CONFIG_INFINIBAND=/d' "$CONF"
            sed -i '/CONFIG_DRM_LEGACY=/d' "$CONF"
            sed -i '/CONFIG_FAULT_INJECTION=/d' "$CONF"
            sed -i '/CONFIG_SAMPLES=/d' "$CONF"
            # Explicitly disable them
            echo "# CONFIG_STAGING is not set" >> "$CONF"
            echo "# CONFIG_SOUND is not set" >> "$CONF"
            echo "# CONFIG_SND is not set" >> "$CONF"
            echo "# CONFIG_RC_CORE is not set" >> "$CONF"
            echo "# CONFIG_MEDIA_RC_SUPPORT is not set" >> "$CONF"
            echo "# CONFIG_LIRC is not set" >> "$CONF"
            echo "# CONFIG_VIDEO_DEV is not set" >> "$CONF"
            echo "# CONFIG_FB is not set" >> "$CONF"
            echo "# CONFIG_VT is not set" >> "$CONF"
            echo "# CONFIG_VHOST is not set" >> "$CONF"
            echo "# CONFIG_COMEDI is not set" >> "$CONF"
            echo "# CONFIG_AGP is not set" >> "$CONF"
            echo "# CONFIG_INFINIBAND is not set" >> "$CONF"
            echo "# CONFIG_DRM_LEGACY is not set" >> "$CONF"
            echo "# CONFIG_FAULT_INJECTION is not set" >> "$CONF"
            echo "# CONFIG_SAMPLES is not set" >> "$CONF"
            # Re-run olddefconfig to clean up
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
              olddefconfig O=out
            echo "Clang-incompatible subsystems disabled"

      - run:
          name: "Apply source patches"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            bash patches/apply_all.sh /tmp/infinity-kernel-build/kernel_src
            echo "Source patches applied"

      - run:
          name: "Build Infinity Kernel"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            make -j$(nproc) \
              ARCH=arm64 \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
              CC=/tmp/infinity-kernel-build/proton-clang/bin/clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              HOSTCC=gcc \
              KCFLAGS="-Wno-error" \
              O=out
          no_output_timeout: 30m

      - run:
          name: "Verify build output"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
              echo "BUILD SUCCESS: Image.gz-dtb exists"
              ls -lh out/arch/arm64/boot/Image.gz-dtb
            else
              echo "BUILD FAILED: Image.gz-dtb not found"
              ls -la out/arch/arm64/boot/ 2>/dev/null || echo "boot dir missing"
              exit 1
            fi

      - run:
          name: "Package AnyKernel3 ZIP"
          command: |
            cd /tmp/infinity-kernel-build
            # Copy kernel image
            cp -f kernel_src/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
            # Update banner version
            sed -i 's/v1\.0\.[0-9]/v1.0.7/g' AnyKernel3/banner 2>/dev/null || true
            # Create ZIP
            cd AnyKernel3
            zip -r9 /tmp/infinity-kernel-build/Infinity-Kernel-v1.0.7-vayu.zip *
            echo "ZIP created"
            ls -lh /tmp/infinity-kernel-build/Infinity-Kernel-v1.0.7-vayu.zip

      - store_artifacts:
          path: /tmp/infinity-kernel-build/Infinity-Kernel-v1.0.7-vayu.zip
          destination: Infinity-Kernel-v1.0.7-vayu.zip

workflows:
  infinity_kernel_build:
    jobs:
      - build