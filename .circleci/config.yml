version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    environment:
      PROJECT_DIR: /tmp/infinity-kernel-build
      KERNEL_DIR: /tmp/infinity-kernel-build/kernel_src
      PROTON_PATH: /tmp/infinity-kernel-build/proton-clang
      ARCH: arm64
      SUBARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-
      CC: clang
      CLANG_TRIPLE: aarch64-linux-gnu-
      ZIP_NAME: InfinityKernel-v1.0.6-vayu.zip
    resource_class: large
    steps:
      - checkout
      - run:
          name: Setup build directory
          command: |
            mkdir -p "$PROJECT_DIR"
            cp -a /root/project/. "$PROJECT_DIR/"
      - run:
          name: Install build dependencies
          command: |
            apt-get update -y
            apt-get install -y \
              git wget unzip curl bc bison build-essential cpio \
              flex g++ gcc-aarch64-linux-gnu libc6-dev-i386 \
              libelf-dev libssl-dev python3 zstd liblz4-tool \
              device-tree-compiler rsync file
      - run:
          name: Clone Proton Clang toolchain
          no_output_timeout: 15m
          command: |
            cd "$PROJECT_DIR"
            if [ ! -x "$PROTON_PATH/bin/clang" ]; then
              echo "Cloning Proton Clang..."
              git clone --depth=1 \
                https://github.com/kdrag0n/proton-clang.git \
                "$PROTON_PATH"

              if [ ! -x "$PROTON_PATH/bin/clang" ]; then
                echo "ERROR: clang not found after clone"
                exit 1
              fi

              # Proton Clang ships llvm-as as 'as' — it lacks -EL flag.
              # Host tools (scripts/mod, scripts/dtc) need GNU as/ld/ar.
              for tool in as ar ld nm objcopy objdump ranlib strip; do
                if [ -f "$PROTON_PATH/bin/$tool" ]; then
                  mv "$PROTON_PATH/bin/$tool" "$PROTON_PATH/bin/$tool.llvm"
                fi
              done
              echo "Renamed Proton Clang host tools to *.llvm"
            fi
            echo "Proton Clang ready:"
            "$PROTON_PATH/bin/clang" --version | head -1
      - run:
          name: Clone Xiaomi kernel source (vayu-r-oss)
          command: |
            cd "$PROJECT_DIR"
            git clone --depth=1 -b vayu-r-oss \
              https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git \
              "$KERNEL_DIR"
      - run:
          name: Copy Infinity Kernel defconfig
          command: |
            cp "$PROJECT_DIR/arch/arm64/configs/infinity_defconfig" \
               "$KERNEL_DIR/arch/arm64/configs/infinity_defconfig"
      - run:
          name: Apply kernel patches
          command: |
            bash "$PROJECT_DIR/patches/apply_all.sh" "$KERNEL_DIR"
      - run:
          name: Integrate charging driver
          command: |
            cd "$KERNEL_DIR"

            cp -r "$PROJECT_DIR/drivers/charging" drivers/infinity_charging
            cp "$PROJECT_DIR/include/linux/infinity_charging_control.h" include/linux/
            mkdir -p scripts/charging_bypass
            cp "$PROJECT_DIR/scripts/charging_bypass/infinity_charging.dts" scripts/charging_bypass/

            echo 'obj-y += infinity_charging/' >> drivers/Makefile
            echo 'source "drivers/infinity_charging/Kconfig"' >> drivers/Kconfig
      - run:
          name: Set defconfig and build
          no_output_timeout: 30m
          command: |
            cd "$KERNEL_DIR"
            export PATH="$PROTON_PATH/bin:$PATH"
            export LD_LIBRARY_PATH="$PROTON_PATH/lib:$LD_LIBRARY_PATH"

            echo "CC: $(which clang)"
            echo "AS: $(which as)"
            echo "LD: $(which ld)"

            # --- Step 1: Generate base .config ---
            scripts/kconfig/merge_config.sh \
              arch/arm64/configs/vayu_defconfig \
              arch/arm64/configs/infinity_defconfig \
              -O arch/arm64/configs/ \
              || true

            make ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 O=out \
                 infinity_defconfig

            # --- Step 2: Aggressively disable Clang-incompatible subsystems ---
            # Using sed directly on .config (more reliable than scripts/config)
            echo "=== Disabling Clang-incompatible configs ==="
            DISABLE_LIST="
              STAGING
              MEDIA_SUPPORT MEDIA_CAMERA_SUPPORT MEDIA_RC_SUPPORT
              RC_CORE LIRC VIDEO_DEV
              V4L_PLATFORM_DRIVERS V4L_MEM2MEM_DRIVERS RADIO_ADAPTERS
              SOUND SND SND_SOC SND_PCM_CODEC
              FB FB_EFI FB_TILEBLITTING
              VT
              COMEDI
              AGP
              INFINIBAND
              FAULT_INJECTION
              SAMPLES
              VHOST VHOST_NET VHOST_SCSI VHOST_VSOCK
              IIO
              DRM_LEGACY
              REGULATOR_USERSPACE_CONSUMER
            "
            for cfg in $DISABLE_LIST; do
              sed -i "s/^CONFIG_${cfg}=y/# CONFIG_${cfg} is not set/" out/.config
              sed -i "s/^CONFIG_${cfg}=m/# CONFIG_${cfg} is not set/" out/.config
            done

            # Also disable any CONFIG that references staging/media/sound/fb
            sed -i '/CONFIG_STAGING=/d' out/.config
            sed -i '/CONFIG_SOUND=/d' out/.config
            sed -i '/CONFIG_SND_/d' out/.config
            sed -i '/CONFIG_MEDIA_/d' out/.config
            sed -i '/CONFIG_RC_/d' out/.config
            sed -i '/CONFIG_VIDEO_/d' out/.config
            sed -i '/CONFIG_V4L_/d' out/.config
            sed -i '/CONFIG_RADIO_/d' out/.config
            sed -i '/CONFIG_FB_/d' out/.config
            sed -i '/CONFIG_VT=/d' out/.config
            sed -i '/CONFIG_DRM_LEGACY/d' out/.config
            sed -i '/CONFIG_COMEDI/d' out/.config
            sed -i '/CONFIG_AGP/d' out/.config
            sed -i '/CONFIG_INFINIBAND/d' out/.config
            sed -i '/CONFIG_SAMPLES=/d' out/.config
            sed -i '/CONFIG_VHOST_/d' out/.config
            echo "# Clang-clean overrides applied" >> out/.config

            # Resolve config dependencies
            yes "" | make ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 O=out \
                 olddefconfig 2>&1 | tail -5

            echo ""
            echo "=== Config verification ==="
            echo "STAGING: $(grep CONFIG_STAGING out/.config | head -1)"
            echo "MEDIA:   $(grep CONFIG_MEDIA_SUPPORT out/.config | head -1)"
            echo "SOUND:   $(grep CONFIG_SOUND out/.config | head -1)"
            echo "RC_CORE: $(grep CONFIG_RC_CORE out/.config | head -1)"
            echo "FB:      $(grep '^CONFIG_FB=' out/.config | head -1)"
            echo "DRM_MSM: $(grep CONFIG_DRM_MSM out/.config | head -1)"

            # --- Step 3: Build with -Wno-error ---
            # Clang is stricter than GCC: warnings that GCC ignores become errors
            # in 4.14 source. -Wno-error prevents this.
            echo ""
            echo "=== Building kernel ==="
            make -j$(nproc) ARCH=$ARCH SUBARCH=$SUBARCH \
                 CROSS_COMPILE=aarch64-linux-gnu- \
                 CC=clang \
                 CLANG_TRIPLE=aarch64-linux-gnu- \
                 HOSTCC=gcc \
                 KCFLAGS="-Wno-error" \
                 O=out \
                 2>&1 | tee build.log

            echo ""
            echo "=== Error Summary ==="
            grep -n "error:" build.log | head -40 || echo "No errors found"
            echo "=== Build result ==="
            tail -5 build.log

            # Check for actual kernel image
            if [ -f out/arch/arm64/boot/Image.gz-dtb ] || \
               [ -f out/arch/arm64/boot/Image.gz ]; then
              echo "BUILD SUCCESS"
              ls -lh out/arch/arm64/boot/Image* 2>/dev/null
            elif grep -q "error:" build.log; then
              echo "BUILD FAILED — see errors above"
              exit 1
            else
              echo "BUILD FAILED — no image produced"
              exit 1
            fi
      - run:
          name: Package AnyKernel3 ZIP
          command: |
            cd "$PROJECT_DIR"

            cp "$KERNEL_DIR/out/arch/arm64/boot/Image.gz-dtb" AnyKernel3/Image.gz-dtb 2>/dev/null || \
            cp "$KERNEL_DIR/out/arch/arm64/boot/Image.gz" AnyKernel3/Image.gz 2>/dev/null || \
              { echo "No kernel image found"; exit 1; }

            find "$KERNEL_DIR/out/arch/arm64/boot/dts/qcom/" \
              -maxdepth 1 \( -name "*.dtb" -o -name "*.dtbo" \) \
              -exec cp {} AnyKernel3/ \; 2>/dev/null || true
            [ -f "$KERNEL_DIR/out/arch/arm64/boot/dtbo.img" ] && \
              cp "$KERNEL_DIR/out/arch/arm64/boot/dtbo.img" AnyKernel3/dtbo.img 2>/dev/null || true
            [ -f "$KERNEL_DIR/out/arch/arm64/boot/dtb.img" ] && \
              cp "$KERNEL_DIR/out/arch/arm64/boot/dtb.img" AnyKernel3/dtb.img 2>/dev/null || true

            chmod 755 AnyKernel3/tools/*

            cd AnyKernel3
            zip -r9 "$PROJECT_DIR/$ZIP_NAME" . \
              -x ".git*" "patch/*" "ramdisk/*" "split_img/*"
            cd "$PROJECT_DIR"

            ls -lh "$ZIP_NAME"
      - store_artifacts:
          path: /tmp/infinity-kernel-build/InfinityKernel-v1.0.6-vayu.zip
          destination: InfinityKernel-v1.0.6-vayu.zip
      - persist_to_workspace:
          root: /tmp/infinity-kernel-build
          paths:
            - InfinityKernel-v1.0.6-vayu.zip

workflows:
  build-kernel:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
                - master
                - dev