# Infinity Kernel v1.0.48
# Poco X3 Pro (vayu/bhima) | SM8150 (LineageOS base) | Linux 4.14.357
# LLVM/Clang 23 (apt.llvm.org) | AnyKernel3 | MIT License
#
# v1.0.48 — COMPLETE REWRITE:
#   - Base changed: MiCode/Xiaomi_Kernel_OpenSource → LineageOS/android_kernel_qcom_sm8150
#   - LineageOS Makefile has NATIVE CLANG_TRIPLE support:
#       --target=aarch64-linux-gnu (from CLANG_TRIPLE)
#       --prefix=aarch64-linux-gnu- (finds correct 'as' for VDSO)
#       -no-integrated-as (added automatically by Makefile)
#     NO wrapper script needed. NO VDSO routing hacks.
#   - Base defconfig: vendor/sm8150_defconfig (merged with infinity_defconfig)
#   - KernelSU-Next v3.2.0, SuSFS v2.1.0
#   - All previous fixes preserved (PROTECTED_CFGS, HIDDEN_CFGS, OpenSSL 3.0)
version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    steps:
      - checkout

      # ── Step 1: Install dependencies + Clang 23 ──────────────
      - run:
          name: "Install dependencies + LLVM/Clang 23"
          command: |
            apt-get update

            apt-get install -y \
              bc bison build-essential ccache curl flex \
              git gnupg gperf imagemagick \
              libelf-dev liblz4-tool libncurses5-dev \
              libssl-dev libxml2 libxml2-utils lzop \
              rsync schedtool squashfs-tools software-properties-common \
              xsltproc zip zlib1g-dev \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
              gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
              python-is-python3 ca-certificates lsb-release wget

            wget -qO- https://apt.llvm.org/llvm.sh | bash -s 23

            echo "=== Clang 23 verification ==="
            CLANG_BIN="/usr/lib/llvm-23/bin/clang"
            echo "clang:     $CLANG_BIN"
            echo "version:   $($CLANG_BIN --version 2>&1 | head -1)"
            echo "ld.lld:    $(ls -la /usr/lib/llvm-23/bin/ld.lld)"
            echo "llvm-ar:   $(ls -la /usr/lib/llvm-23/bin/llvm-ar)"
            echo "aarch64-as: $(which aarch64-linux-gnu-as)"
            echo "aarch64-gcc: $(which aarch64-linux-gnu-gcc)"
            echo "================================="

      # ── Step 2: Determine SRC_ROOT ───────────────────────────
      - run:
          name: "Determine SRC_ROOT"
          command: |
            if [ -f "arch/arm64/configs/infinity_defconfig" ]; then
              echo 'export SRC_ROOT="."' >> "$BASH_ENV"
            elif [ -d "infinity-kernel" ] && [ -f "infinity-kernel/arch/arm64/configs/infinity_defconfig" ]; then
              echo 'export SRC_ROOT="infinity-kernel"' >> "$BASH_ENV"
            else
              echo "FATAL: infinity_defconfig not found"
              find . -name "infinity_defconfig" 2>/dev/null || true
              exit 1
            fi
            echo "SRC_ROOT=$SRC_ROOT"

      # ── Step 3: Clone LineageOS kernel source ────────────────
      - run:
          name: "Clone LineageOS android_kernel_qcom_sm8150"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            if [ ! -d "$KERNEL_SRC/.git" ]; then
              git clone --depth=1 \
                https://github.com/LineageOS/android_kernel_qcom_sm8150 \
                "$KERNEL_SRC"
            fi
            echo "Kernel version: $(head -3 $KERNEL_SRC/Makefile | tr '\n' ' ')"
            echo "KERNEL_SRC=$KERNEL_SRC"

      # ── Step 4: KernelSU-Next v3.2.0 ────────────────────────
      - run:
          name: "KernelSU-Next v3.2.0 setup"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            if [ -d "KernelSU/kernel" ]; then
              echo "KernelSU-Next already present"
            else
              echo "Cloning KernelSU-Next v3.2.0..."
              KSU_CLONED=0
              for KSU_URL in \
                "https://github.com/KernelSU-Next/KernelSU" \
                "https://github.com/negrroo/KernelSU" \
                "https://github.com/tiann/KernelSU"; do
                echo "Trying: $KSU_URL"
                if GIT_TERMINAL_PROMPT=0 git clone --depth=1 --branch main \
                     --config "credential.helper=" \
                     "$KSU_URL" KernelSU 2>/dev/null; then
                  KSU_CLONED=1
                  echo "Cloned from: $KSU_URL"
                  break
                fi
                rm -rf KernelSU
              done
              if [ "$KSU_CLONED" = "0" ]; then
                echo "WARNING: main branch failed, trying v3.2.0 tag..."
                for KSU_URL in \
                  "https://github.com/KernelSU-Next/KernelSU" \
                  "https://github.com/negrroo/KernelSU"; do
                  if GIT_TERMINAL_PROMPT=0 git clone --depth=1 --branch v3.2.0 \
                       --config "credential.helper=" \
                       "$KSU_URL" KernelSU 2>/dev/null; then
                    KSU_CLONED=1
                    echo "Cloned from: $KSU_URL (branch v3.2.0)"
                    break
                  fi
                  rm -rf KernelSU
                done
              fi
              if [ "$KSU_CLONED" = "1" ] && [ -f KernelSU/kernel/setup.sh ]; then
                bash KernelSU/kernel/setup.sh -o KernelSU 2>/dev/null || true
              fi
              if [ "$KSU_CLONED" = "1" ]; then
                echo "KernelSU ready"
              else
                echo "WARNING: KernelSU not cloned — build continues without it"
              fi
            fi

      # ── Step 5: SuSFS v2.1.0 ───────────────────────────────
      - run:
          name: "SuSFS v2.1.0 patch (Linux 4.14)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            SUSFS_MARKER=".susfs_v2.1.0_applied"
            if [ -f "$SUSFS_MARKER" ]; then
              echo "SuSFS v2.1.0 already applied"
            else
              echo "Downloading SuSFS v2.1.0 for Linux 4.14..."
              PATCH_FOUND=0
              for repo_url in \
                "https://github.com/AnymoreProject/susfs4ksu" \
                "https://github.com/sidex15/susfs4ksu"; do
                tmp_repo=$(mktemp -d)
                if GIT_TERMINAL_PROMPT=0 git clone --depth=1 \
                     --config "credential.helper=" \
                     "$repo_url" "$tmp_repo/repo" 2>/dev/null; then
                  PATCH_FILE=$(find "$tmp_repo/repo" -name "*4.14*.patch" 2>/dev/null | sort | head -1)
                  if [ -n "$PATCH_FILE" ] && [ -f "$PATCH_FILE" ]; then
                    echo "Found patch: $(basename "$PATCH_FILE") from $repo_url"
                    if grep -q "susfs" "$PATCH_FILE" 2>/dev/null; then
                      echo "Applying patch..."
                      patch -p1 --forward < "$PATCH_FILE" || {
                        patch -p1 --dry-run --forward < "$PATCH_FILE" 2>&1 | grep -q "Reversed" && \
                          echo "Patch already partially applied — continuing"
                      }
                      PATCH_FOUND=1
                      touch "$SUSFS_MARKER"
                    fi
                  fi
                fi
                rm -rf "$tmp_repo"
                [ "$PATCH_FOUND" = "1" ] && break
              done
              if [ "$PATCH_FOUND" = "0" ]; then
                echo "WARNING: SuSFS patch not found automatically."
                echo "Will check patches/ directory later."
              fi
            fi

      # ── Step 6: Copy project files to kernel source ─────────
      - run:
          name: "Copy infinity kernel files"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            echo "SRC_ROOT=$SRC_ROOT"

            cp -v "$SRC_ROOT/arch/arm64/configs/infinity_defconfig" \
                    "$KERNEL_SRC/arch/arm64/configs/infinity_defconfig"

            if [ -d "$SRC_ROOT/drivers/charging" ]; then
              cp -rv "$SRC_ROOT/drivers/charging" "$KERNEL_SRC/drivers/charging"
            fi
            if ! grep -q "source \"drivers/charging/Kconfig\"" "$KERNEL_SRC/drivers/Kconfig" 2>/dev/null; then
              echo 'source "drivers/charging/Kconfig"' >> "$KERNEL_SRC/drivers/Kconfig"
            fi
            if ! grep -q "obj-\$(CONFIG_CHARGING_CONTROL)" "$KERNEL_SRC/drivers/Makefile" 2>/dev/null; then
              echo 'obj-$(CONFIG_CHARGING_CONTROL)      += charging/' >> "$KERNEL_SRC/drivers/Makefile"
            fi

            if [ -d "$SRC_ROOT/include/linux" ]; then
              cp -v "$SRC_ROOT/include/linux/infinity_charging_control.h" \
                      "$KERNEL_SRC/include/linux/infinity_charging_control.h"
            fi

            if [ -d "$SRC_ROOT/patches" ]; then
              cp -rv "$SRC_ROOT/patches" "$KERNEL_SRC/patches"
            fi

            echo "Files copied."

      # ── Step 7: Kernel configuration ────────────────────────
      - run:
          name: "Kernel config (sm8150_defconfig + merge + disable + HIDDEN_CFGS)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            PROTECTED_CFGS="CONFIG_NO_HZ_COMMON CONFIG_NO_HZ_IDLE CONFIG_VIRT_CPU_ACCOUNTING_GEN CONFIG_CONTEXT_TRACKING CONFIG_NO_HZ CONFIG_HZ_PERIODIC CONFIG_NO_HZ_FULL CONFIG_CPUSETS"

            DISABLE_LIST="CONFIG_STAGING CONFIG_SOUND CONFIG_SND CONFIG_RC_CORE \
              CONFIG_MEDIA_SUPPORT CONFIG_FB CONFIG_VT CONFIG_VHOST \
              CONFIG_COMEDI CONFIG_AGP CONFIG_INFINIBAND \
              CONFIG_MHI_BUS CONFIG_FAULT_INJECTION CONFIG_BLK_DEV_IO_TRACE"

            make ARCH=arm64 vendor/sm8150_defconfig O=out

            scripts/kconfig/merge_config.sh -O out/ out/.config \
              arch/arm64/configs/infinity_defconfig || true

            make ARCH=arm64 olddefconfig O=out </dev/null || true

            disable_cfgs() {
              for cfg in $DISABLE_LIST; do
                _skip=0
                for p in $PROTECTED_CFGS; do
                  if [ "$cfg" = "$p" ]; then _skip=1; break; fi
                done
                [ "$_skip" = "1" ] && continue
                sed -i "s/^${cfg}=y/# ${cfg} is not set/" out/.config
                sed -i "s/^${cfg}=m/# ${cfg} is not set/" out/.config
              done
              sed -i 's/^CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/' out/.config
              sed -i 's/^CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' out/.config
              sed -i '/^CONFIG_CC_STACKPROTECTOR_NONE/d' out/.config
              echo "CONFIG_CC_STACKPROTECTOR_NONE=y" >> out/.config
            }

            echo "  [1/6] First disable pass..."
            disable_cfgs
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "  [2/6] Second disable pass..."
            disable_cfgs
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            echo "  [3/6] Third disable pass (sed kill)..."
            for cfg in $DISABLE_LIST; do
              _skip=0
              for p in $PROTECTED_CFGS; do
                if [ "$cfg" = "$p" ]; then _skip=1; break; fi
              done
              [ "$_skip" = "1" ] && continue
              sed -i "/^${cfg}=/d" out/.config
              if ! grep -q "^# ${cfg} is not set" out/.config; then
                echo "# ${cfg} is not set" >> out/.config
              fi
            done
            make ARCH=arm64 olddefconfig O=out </dev/null || true

            HIDDEN_CFGS="CONFIG_SCHED_INFO CONFIG_PINCTRL CONFIG_POSIX_TIMERS CONFIG_RTC_CLASS CONFIG_SCHED_WALT CONFIG_DEBUG_REGULATOR"

            echo "  [4/6] Compiling scripts..."
            make ARCH=arm64 O=out -j1 scripts 2>&1 | tail -5 || true

            echo "  [5/6] Patching HIDDEN_CFGS..."
            for cfg in $HIDDEN_CFGS; do
              if ! grep -q "^${cfg}=y" out/.config; then
                sed -i "/^# ${cfg} is not set/d" out/.config
                echo "${cfg}=y" >> out/.config
              fi
              if [ -f out/include/config/auto.conf ]; then
                if ! grep -q "^${cfg}=y" out/include/config/auto.conf; then
                  sed -i "/^${cfg}=/d" out/include/config/auto.conf
                  echo "${cfg}=y" >> out/include/config/auto.conf
                fi
              fi || true
              if [ -f out/include/generated/autoconf.h ]; then
                if ! grep -q "#define ${cfg} 1" out/include/generated/autoconf.h; then
                  sed -i "/#define ${cfg} /d" out/include/generated/autoconf.h
                  echo "#define ${cfg} 1" >> out/include/generated/autoconf.h
                fi
              fi || true
            done

            echo "  [6/6] Verifying HIDDEN_CFGS..."
            for cfg in $HIDDEN_CFGS; do
              if grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                echo "  OK:   ${cfg}"
              else
                echo "  FAIL: ${cfg} NOT in .config!"
              fi
            done

            echo "  Verifying PROTECTED_CFGS..."
            for cfg in $PROTECTED_CFGS; do
              if grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                echo "  OK:   ${cfg}=y"
              elif grep -q "^# ${cfg} is not set" out/.config 2>/dev/null; then
                echo "  WARN: ${cfg} is not set!"
              else
                echo "  INFO: ${cfg} not in .config (may be selected)"
              fi
            done

            echo "  NR_CPUS: $(grep 'CONFIG_NR_CPUS' out/.config | head -1)"
            touch out/include/config/auto.conf out/include/generated/autoconf.h 2>/dev/null || true
            echo "Configuration ready."

      # ── Step 8: OpenSSL 3.0 patches ─────────────────────────
      - run:
          name: "OpenSSL 3.0 patches (Ubuntu 22.04)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            if [ -f "$KERNEL_SRC/certs/extract-cert.c" ]; then
              sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' \
                "$KERNEL_SRC/certs/extract-cert.c"
            fi
            if [ -f "$KERNEL_SRC/scripts/sign-file.c" ]; then
              sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' \
                "$KERNEL_SRC/scripts/sign-file.c"
            fi
            echo "OpenSSL patches applied."

      # ── Step 9: Apply patches ───────────────────────────────
      - run:
          name: "Apply patches (apply_all.sh) + SuSFS config"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            if [ -f patches/apply_all.sh ]; then
              bash patches/apply_all.sh .
            fi

            if grep -q "CONFIG_SUFS_FS" out/.config 2>/dev/null; then
              echo "SUFS_FS already in .config"
            else
              if find . -name "Kconfig.sufs" -o -name "Kconfig.susfs" 2>/dev/null | head -1 | grep -q .; then
                echo "CONFIG_SUFS_FS=y" >> out/.config
                echo "CONFIG_SUFS=y" >> out/.config
                echo "SUFS_FS added to .config"
              fi
            fi

            make ARCH=arm64 olddefconfig O=out </dev/null || true
            echo "Patches applied."

      # ── Step 10: Source compatibility fixes (LineageOS sm8150) ──
      - run:
          name: "Source compatibility fixes (LineageOS sm8150 + Clang 23)"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            echo "=== Fix 1/4: filter.h compat_uptr_t without CONFIG_COMPAT ==="
            if grep -q 'compat_uptr_t' include/linux/filter.h; then
              _fix_py="/tmp/fix_filter_h.py"
              echo 'import re' > "$_fix_py"
              echo 'f="include/linux/filter.h"' >> "$_fix_py"
              echo 'c=open(f).read()' >> "$_fix_py"
              echo 'p=r"(struct compat_sock_fprog \{[^}]+\};)"' >> "$_fix_py"
              echo 'c=re.sub(p,"#ifdef CONFIG_COMPAT\\n"+r"\1"+"\\n#endif /* CONFIG_COMPAT */",c,count=1)' >> "$_fix_py"
              echo 'open(f,"w").write(c)' >> "$_fix_py"
              echo 'print("  Fixed: wrapped compat_sock_fprog")' >> "$_fix_py"
              python3 "$_fix_py"
              rm -f "$_fix_py"
            else
              echo "  Skipped: compat_uptr_t not found"
            fi

            echo "=== Fix 2/4: hugetlbpage.c ptep vs pte variable name ==="
            # Line ~235: 'ptep = huge_pmd_share(...)' but variable is
            # declared as 'pte_t *pte'. Rename ptep to pte.
            if grep -q 'ptep = huge_pmd_share' arch/arm64/mm/hugetlbpage.c; then
              sed -i 's/ptep = huge_pmd_share/pte = huge_pmd_share/' \
                arch/arm64/mm/hugetlbpage.c
              echo "  Fixed: ptep -> pte in huge_pmd_share call"
            else
              echo "  Skipped: pattern not found"
            fi

            echo "=== Fix 3/4: huge_memory.c try_to_unmap missing 3rd arg ==="
            # try_to_unmap() in this kernel version requires 3 args:
            #   (page, flags, vma). Add NULL as vma.
            if grep -q 'try_to_unmap(page, ttu_flags);' mm/huge_memory.c; then
              sed -i 's/try_to_unmap(page, ttu_flags);/try_to_unmap(page, ttu_flags, NULL);/' \
                mm/huge_memory.c
              echo "  Fixed: added NULL vma argument to try_to_unmap"
            else
              echo "  Skipped: pattern not found"
            fi

            echo "=== Fix 4/4: khugepaged.c nr_ptes removed from mm_struct ==="
            # mm->nr_ptes was removed. mm_dec_nr_ptes() on the line above
            # already handles the decrement. Remove the duplicate.
            if grep -q 'atomic_long_dec(&mm->nr_ptes)' mm/khugepaged.c; then
              sed -i '/atomic_long_dec(&mm->nr_ptes)/d' mm/khugepaged.c
              echo "  Fixed: removed duplicate nr_ptes decrement"
            else
              echo "  Skipped: pattern not found"
            fi

            echo "=== All source fixes applied ==="

      # ── Step 10b: More source fixes (sock.c, kallsyms.c, task_mmu.c) ──
      - run:
          name: "Source fixes: compat, kallsyms, task_mmu"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            echo "=== Fix 5/7: sock.c compat_timeval without CONFIG_COMPAT ==="
            if grep -q 'COMPAT_USE_64BIT_TIME' net/core/sock.c; then
              echo '' | base64 -d | python3
            else
              echo "  Skipped: not needed"
            fi

            echo "=== Fix 6/7: kallsyms.c revert apply_all.sh damage ==="
            # apply_all.sh may corrupt EXPORT_SYMBOL line. Restore from git.
            git checkout -- kernel/kallsyms.c 2>/dev/null && \
              echo "  Fixed: kallsyms.c restored" || \
              echo "  Skipped: not in git or no change"

            echo "=== Fix 7/7: task_mmu.c pmd type in reclaim_pte_range ==="
            # The function reclaim_pte_range uses pmd_trans_unstable(pmd)
            # and pte_offset_map_lock(mm, pmd, ...) where pmd might be
            # evaluated incorrectly. Cast to pmd_t * explicitly.
            if grep -q 'reclaim_pte_range' fs/proc/task_mmu.c; then
              sed -i 's/pmd_trans_unstable(pmd)/pmd_trans_unstable((pmd_t *)pmd)/' \
                fs/proc/task_mmu.c
              echo "  Fixed: added pmd_t * cast in reclaim_pte_range"
            else
              echo "  Skipped: reclaim_pte_range not found"
            fi

            echo "=== All additional fixes applied ==="

      # ── Step 11: Clean source tree ──────────────────────────
      - run:
          name: "Clean source tree"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"
            rm -f .config
            rm -rf include/config
            echo "Source tree cleaned."

      # ── Step 12: Build kernel ───────────────────────────────
      - run:
          name: "Build Infinity Kernel (Clang 23 + KSU-Next + SuSFS)"
          no_output_timeout: 30m
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            cd "$KERNEL_SRC"

            CLANG_DIR="/usr/lib/llvm-23/bin"
            export PATH="$CLANG_DIR:$PATH"

            # ═══════════════════════════════════════════════════════
            # NO WRAPPER NEEDED!
            #
            # LineageOS Makefile handles everything natively:
            #   CLANG_TRIPLE=aarch64-linux-gnu-  (passed to make)
            #     → Makefile adds: --target=aarch64-linux-gnu
            #     → Makefile adds: --prefix=aarch64-linux-gnu-
            #     → Makefile adds: -no-integrated-as
            #     → VDSO .S files use $(CC) $(a_flags) where
            #       a_flags includes --prefix, so Clang finds
            #       aarch64-linux-gnu-as (NOT plain 'as')
            # ═══════════════════════════════════════════════════════

            echo "=== Toolchain diagnostics ==="
            echo "clang:      $(which clang) -> $(clang --version 2>&1 | head -1)"
            echo "aarch64-as: $(which aarch64-linux-gnu-as)"
            echo "aarch64-ld: $(which aarch64-linux-gnu-ld)"
            echo "cross-gcc:  $(which aarch64-linux-gnu-gcc)"
            echo "ld.lld:     $(which ld.lld)"

            # ── Make flags ───────────────────────────────────────
            # CC points directly to Clang 23 (no wrapper!)
            # CLANG_TRIPLE tells the LineageOS Makefile to add
            # --target and --prefix automatically.
            COMMON_MAKE="O=out \
              ARCH=arm64 \
              CC=$CLANG_DIR/clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
              LD=$CLANG_DIR/ld.lld \
              AR=$CLANG_DIR/llvm-ar \
              NM=$CLANG_DIR/llvm-nm \
              OBJCOPY=$CLANG_DIR/llvm-objcopy \
              OBJDUMP=$CLANG_DIR/llvm-objdump \
              STRIP=$CLANG_DIR/llvm-strip \
              HOSTCC=gcc \
              HOSTCFLAGS=\"-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error\""

            # ═══════════════════════════════════════════════════════
            # Phase 2a: Regenerate auto.conf
            # ═══════════════════════════════════════════════════════
            echo "=== Phase 2a: Regenerating auto.conf ==="
            make ARCH=arm64 O=out olddefconfig </dev/null 2>&1 || true

            if [ -f out/include/config/auto.conf ]; then
              echo "auto.conf exists: $(ls -la out/include/config/auto.conf)"
            else
              echo "auto.conf NOT found — regenerating via make scripts..."
              eval make $COMMON_MAKE -j1 scripts 2>&1 | tail -10 || true
            fi

            # ═══════════════════════════════════════════════════════
            # Phase 2b: Patch hidden configs
            # ═══════════════════════════════════════════════════════
            echo "=== Phase 2b: Patching hidden configs ==="
            HIDDEN_CFGS="CONFIG_SCHED_INFO CONFIG_PINCTRL CONFIG_POSIX_TIMERS CONFIG_RTC_CLASS CONFIG_SCHED_WALT CONFIG_DEBUG_REGULATOR"

            for cfg in $HIDDEN_CFGS; do
              if ! grep -q "^${cfg}=y" out/.config 2>/dev/null; then
                sed -i "/^# ${cfg} is not set/d" out/.config 2>/dev/null || true
                echo "${cfg}=y" >> out/.config
              fi
              if [ -f out/include/config/auto.conf ]; then
                if ! grep -q "^${cfg}=y" out/include/config/auto.conf; then
                  sed -i "/^${cfg}=/d" out/include/config/auto.conf
                  echo "${cfg}=y" >> out/include/config/auto.conf
                fi
              fi || true
              if [ -f out/include/generated/autoconf.h ]; then
                if ! grep -q "#define ${cfg} 1" out/include/generated/autoconf.h; then
                  sed -i "/#define ${cfg} /d" out/include/generated/autoconf.h
                  echo "#define ${cfg} 1" >> out/include/generated/autoconf.h
                fi
              fi || true
            done

            echo "=== Verifying ==="
            for cfg in $HIDDEN_CFGS; do
              grep -q "^${cfg}=y" out/.config 2>/dev/null && echo "OK:   ${cfg}" || echo "WARN: ${cfg} missing"
            done
            for pcfg in CONFIG_NO_HZ_COMMON CONFIG_VIRT_CPU_ACCOUNTING_GEN CONFIG_CONTEXT_TRACKING; do
              grep -q "^${pcfg}=y" out/.config 2>/dev/null && echo "OK:   ${pcfg}=y (protected)" || \
                grep -q "^# ${pcfg} is not set" out/.config 2>/dev/null && echo "FAIL: ${pcfg} is not set!" || \
                echo "INFO: ${pcfg} implicit"
            done
            echo "NR_CPUS: $(grep 'CONFIG_NR_CPUS' out/.config | head -1)"

            touch out/include/config/auto.conf out/include/generated/autoconf.h 2>/dev/null || true

            # ═══════════════════════════════════════════════════════
            # Phase 2c: Build kernel (parallel)
            # ═══════════════════════════════════════════════════════
            echo "=== Phase 2c: Building kernel (-j$(nproc)) ==="
            set -o pipefail

            eval make $COMMON_MAKE \
              KCFLAGS="-Wno-error" \
              -j$(nproc) Image.gz-dtb dtbs 2>&1 | tee /tmp/kernel_build.log

            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              echo ""
              echo "=========================================="
              echo "  BUILD ERROR"
              echo "=========================================="
              grep -E "error:" /tmp/kernel_build.log | head -30
              echo "--- Last 80 lines ---"
              tail -80 /tmp/kernel_build.log
              exit 1
            fi

      # ── Step 13: Package AnyKernel3 ZIP ─────────────────────
      - run:
          name: "Package AnyKernel3 ZIP"
          command: |
            KERNEL_SRC="/tmp/infinity-kernel-build/kernel_src"
            IMG="$KERNEL_SRC/out/arch/arm64/boot/Image.gz-dtb"

            if [ ! -f "$IMG" ]; then
              echo "ERROR: Image.gz-dtb not found!"
              ls -la "$KERNEL_SRC/out/arch/arm64/boot/" 2>/dev/null || echo "boot dir does not exist"
              exit 1
            fi

            echo "Image.gz-dtb: $(du -sh "$IMG" | cut -f1)"

            if [ -d "AnyKernel3" ]; then
              cp -v "$IMG" AnyKernel3/
              cd AnyKernel3
              zip -r9 /tmp/infinity-kernel-v1.0.48.zip *
              echo "ZIP: /tmp/infinity-kernel-v1.0.48.zip ($(du -sh /tmp/infinity-kernel-v1.0.48.zip | cut -f1))"
            elif [ -n "${SRC_ROOT:-}" ] && [ -d "$SRC_ROOT/AnyKernel3" ]; then
              cp -v "$IMG" "$SRC_ROOT/AnyKernel3/"
              cd "$SRC_ROOT/AnyKernel3"
              zip -r9 /tmp/infinity-kernel-v1.0.48.zip *
              echo "ZIP: /tmp/infinity-kernel-v1.0.48.zip ($(du -sh /tmp/infinity-kernel-v1.0.48.zip | cut -f1))"
            else
              echo "ERROR: AnyKernel3 directory not found"
              exit 1
            fi

      - store_artifacts:
          path: /tmp/infinity-kernel-v1.0.48.zip
          destination: infinity-kernel-v1.0.48.zip

workflows:
  infinity_build:
    jobs:
      - build