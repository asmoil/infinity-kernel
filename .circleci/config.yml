version: 2.1

jobs:
  build:
    docker:
      - image: ubuntu:22.04
    resource_class: large
    working_directory: /tmp/infinity-kernel-build
    steps:
      - checkout

      - run:
          name: "Detect project structure after checkout"
          command: |
            echo "=== Working directory contents ==="
            ls -la /tmp/infinity-kernel-build/
            echo ""
            echo "=== Searching for infinity_defconfig ==="
            find /tmp/infinity-kernel-build/ -name "infinity_defconfig" -type f 2>/dev/null
            echo ""
            echo "=== Searching for apply_all.sh ==="
            find /tmp/infinity-kernel-build/ -name "apply_all.sh" -type f 2>/dev/null
            echo ""
            echo "=== Searching for infinity_charging_control.c ==="
            find /tmp/infinity-kernel-build/ -name "infinity_charging_control.c" -type f 2>/dev/null
            echo ""
            echo "=== Searching for anykernel.sh ==="
            find /tmp/infinity-kernel-build/ -name "anykernel.sh" -type f 2>/dev/null
            echo ""

      - run:
          name: "Set SRC_ROOT variable"
          command: |
            # Auto-detect where our project files are located
            # Case 1: files at repo root (e.g. /tmp/infinity-kernel-build/arch/...)
            # Case 2: files in subdirectory (e.g. /tmp/infinity-kernel-build/infinity-kernel/arch/...)
            if [ -f /tmp/infinity-kernel-build/arch/arm64/configs/infinity_defconfig ]; then
              echo "SRC_ROOT=/tmp/infinity-kernel-build" >> $BASH_ENV
              echo "Detected: files at repo root"
            elif [ -f /tmp/infinity-kernel-build/infinity-kernel/arch/arm64/configs/infinity_defconfig ]; then
              echo "SRC_ROOT=/tmp/infinity-kernel-build/infinity-kernel" >> $BASH_ENV
              echo "Detected: files in infinity-kernel/ subdirectory"
            else
              # Search recursively
              FOUND=$(find /tmp/infinity-kernel-build/ -name "infinity_defconfig" -type f 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                DIR=$(dirname "$FOUND")
                ROOT=$(echo "$DIR" | sed 's|/arch/arm64/configs||')
                echo "SRC_ROOT=$ROOT" >> $BASH_ENV
                echo "Detected: files at $ROOT"
              else
                echo "ERROR: Cannot find infinity_defconfig anywhere!"
                echo "Make sure ALL files from the archive are pushed to GitHub."
                echo "Your repo must contain: arch/, drivers/, patches/, include/, scripts/, AnyKernel3/"
                exit 1
              fi
            fi

      - run:
          name: "Infinity Kernel v1.0.8 - Install dependencies"
          command: |
            apt update && apt install -y \
              bc bison build-essential ccache curl flex \
              g++-multilib gcc-multilib git gnupg gperf \
              imagemagick lib32ncurses5-dev lib32readline-dev \
              lib32z1-dev libelf-dev liblz4-tool libncurses5-dev \
              libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
              lzop pngcrush rsync schedtool squashfs-tools \
              xsltproc zip zlib1g-dev python3

      - run:
          name: "Clone Proton Clang 17"
          command: |
            git clone --depth=1 https://github.com/kdrag0n/proton-clang.git proton-clang

      - run:
          name: "Fix Proton Clang host tools (LLVM as != GNU as)"
          command: |
            cd /tmp/infinity-kernel-build/proton-clang/bin
            for tool in as nm ar ranlib objcopy objdump strip; do
              if [ -f "$tool" ]; then
                mv "$tool" "${tool}.llvm"
                echo "Renamed: $tool -> ${tool}.llvm"
              fi
            done
            echo "Host tools fix complete"

      - run:
          name: "Clone Xiaomi kernel source (vayu-r-oss)"
          command: |
            git clone --depth=1 -b vayu-r-oss \
              https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git /tmp/infinity-kernel-build/kernel_src

      - run:
          name: "Copy Infinity Kernel source files into kernel tree"
          command: |
            echo "Using SRC_ROOT=$SRC_ROOT"
            echo ""
            # Verify source root
            ls -la "$SRC_ROOT/arch/arm64/configs/infinity_defconfig"
            ls -la "$SRC_ROOT/drivers/charging/infinity_charging_control.c"
            ls -la "$SRC_ROOT/patches/apply_all.sh"
            echo ""

            KSRC="/tmp/infinity-kernel-build/kernel_src"

            # 1. Defconfig fragment
            mkdir -p "$KSRC/arch/arm64/configs"
            cp -f "$SRC_ROOT/arch/arm64/configs/infinity_defconfig" "$KSRC/arch/arm64/configs/"
            echo "[OK] infinity_defconfig copied"

            # 2. Charging driver
            mkdir -p "$KSRC/drivers/charging"
            cp -f "$SRC_ROOT/drivers/charging/infinity_charging_control.c" "$KSRC/drivers/charging/"
            cp -f "$SRC_ROOT/drivers/charging/Kconfig" "$KSRC/drivers/charging/"
            cp -f "$SRC_ROOT/drivers/charging/Makefile" "$KSRC/drivers/charging/"
            echo "[OK] Charging driver copied"

            # 3. Charging driver header
            mkdir -p "$KSRC/include/linux"
            cp -f "$SRC_ROOT/include/linux/infinity_charging_control.h" "$KSRC/include/linux/"
            echo "[OK] Header copied"

            # 4. DTS overlay
            mkdir -p "$KSRC/scripts/charging_bypass"
            cp -f "$SRC_ROOT/scripts/charging_bypass/infinity_charging.dts" "$KSRC/scripts/charging_bypass/"
            echo "[OK] DTS copied"

            # 5. Patch script
            mkdir -p "$KSRC/patches"
            cp -f "$SRC_ROOT/patches/apply_all.sh" "$KSRC/patches/"
            echo "[OK] Patch script copied"

            # 6. Register charging driver in kernel build system
            if ! grep -q 'infinity_charging' "$KSRC/drivers/Makefile" 2>/dev/null; then
              echo 'obj-y += charging/' >> "$KSRC/drivers/Makefile"
              echo "[OK] Added obj-y += charging/ to drivers/Makefile"
            fi
            if ! grep -q 'infinity_charging' "$KSRC/drivers/Kconfig" 2>/dev/null; then
              echo 'source "drivers/charging/Kconfig"' >> "$KSRC/drivers/Kconfig"
              echo "[OK] Added source to drivers/Kconfig"
            fi

            echo ""
            echo "=== All source files integrated ==="

      - run:
          name: "Generate base config (vayu_user_defconfig)"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            # List available defconfigs to confirm
            echo "Available vayu defconfigs:"
            ls -la arch/arm64/configs/vayu*
            echo ""
            # Generate .config from the REAL device defconfig
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
              vayu_user_defconfig O=out
            echo "Base .config generated from vayu_user_defconfig"

      - run:
          name: "Merge Infinity Kernel defconfig fragment"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            # Merge our infinity_defconfig fragment ON TOP of the base config
            scripts/kconfig/merge_config.sh -m out/.config \
              arch/arm64/configs/infinity_defconfig \
              || true
            # Resolve all config dependencies
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
              olddefconfig O=out
            echo "Infinity defconfig merged and resolved"

      - run:
          name: "Disable Clang-incompatible subsystems"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            CONF="out/.config"
            # Remove all configs for subsystems that don't compile with Clang 17 on 4.14
            for CFG in STAGING SOUND SND RC_CORE MEDIA_RC_SUPPORT LIRC \
              V4L_PLATFORM_DRIVERS V4L_MEM2MEM_DRIVERS RADIO_ADAPTERS \
              VIDEO_DEV FB VT VHOST COMEDI AGP INFINIBAND DRM_LEGACY \
              FAULT_INJECTION SAMPLES; do
              sed -i "/CONFIG_${CFG}=/d" "$CONF"
              echo "# CONFIG_${CFG} is not set" >> "$CONF"
            done
            # Re-run olddefconfig to clean up after removal
            make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
              olddefconfig O=out
            echo "Clang-incompatible subsystems disabled"

      - run:
          name: "Apply source patches"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            bash patches/apply_all.sh /tmp/infinity-kernel-build/kernel_src
            echo "Source patches applied"

      - run:
          name: "Build Infinity Kernel"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            make -j$(nproc) \
              ARCH=arm64 \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
              CC=/tmp/infinity-kernel-build/proton-clang/bin/clang \
              CLANG_TRIPLE=aarch64-linux-gnu- \
              HOSTCC=gcc \
              KCFLAGS="-Wno-error" \
              O=out
          no_output_timeout: 30m

      - run:
          name: "Verify build output"
          command: |
            cd /tmp/infinity-kernel-build/kernel_src
            if [ -f out/arch/arm64/boot/Image.gz-dtb ]; then
              echo "BUILD SUCCESS: Image.gz-dtb exists"
              ls -lh out/arch/arm64/boot/Image.gz-dtb
            else
              echo "BUILD FAILED: Image.gz-dtb not found"
              echo "Checking for alternative output files..."
              ls -la out/arch/arm64/boot/ 2>/dev/null || echo "boot dir missing"
              exit 1
            fi

      - run:
          name: "Package AnyKernel3 ZIP"
          command: |
            cd /tmp/infinity-kernel-build
            # Find and copy AnyKernel3 from SRC_ROOT
            AK3=""
            if [ -d "$SRC_ROOT/AnyKernel3" ]; then
              AK3="$SRC_ROOT/AnyKernel3"
            elif [ -d /tmp/infinity-kernel-build/AnyKernel3 ]; then
              AK3="/tmp/infinity-kernel-build/AnyKernel3"
            fi

            if [ -z "$AK3" ] || [ ! -d "$AK3" ]; then
              echo "ERROR: AnyKernel3 directory not found!"
              exit 1
            fi

            # Copy kernel image
            cp -f kernel_src/out/arch/arm64/boot/Image.gz-dtb "$AK3/"
            echo "[OK] Image.gz-dtb copied to AnyKernel3"

            # Create ZIP
            cd "$AK3"
            zip -r9 /tmp/infinity-kernel-build/Infinity-Kernel-v1.0.8-vayu.zip *
            echo ""
            echo "ZIP created:"
            ls -lh /tmp/infinity-kernel-build/Infinity-Kernel-v1.0.8-vayu.zip

      - store_artifacts:
          path: /tmp/infinity-kernel-build/Infinity-Kernel-v1.0.8-vayu.zip
          destination: Infinity-Kernel-v1.0.8-vayu.zip

workflows:
  infinity_kernel_build:
    jobs:
      - build