# Infinity Kernel v1.0.58
# Poco X3 Pro (vayu/bhima) | SM8150 (LineageOS base) | Linux 4.14.357
# Neutron Clang (clang-build-catalogue) | AnyKernel3 | MIT License
# CI: CircleCI | OS: ubuntu:24.04 (glibc 2.39)
version: 2.1

jobs:
  build:
    working_directory: ~/project
    docker:
      - image: ubuntu:24.04
    resource_class: large
    environment:
      KERNEL_SRC: "kernel_scr"
      TC_DIR: "/root/tc"
      TC_TAG: "17062026"
      VERSION: "v1.0.59"
    steps:
      - checkout

      # ── Step 1: Install dependencies + Neutron Clang ───
      - run:
          name: "Install dependencies + Neutron Clang"
          command: |
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y bc bison build-essential ccache curl flex git gperf \
              libelf-dev liblz4-tool libncurses-dev libssl-dev libxml2-utils \
              lzop rsync schedtool squashfs-tools xsltproc zip zlib1g-dev zstd \
              gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
              gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
              ca-certificates wget
            mkdir -p "$TC_DIR"
            curl -sL "https://github.com/Neutron-Toolchains/clang-build-catalogue/releases/download/${TC_TAG}/neutron-clang-${TC_TAG}.tar.zst" -o /tmp/neutron.tar.zst
            tar -xf /tmp/neutron.tar.zst -C "$TC_DIR" --strip-components=1
            rm -f /tmp/neutron.tar.zst
            export PATH="${TC_DIR}/bin:$PATH"
            echo "export PATH=${TC_DIR}/bin:\$PATH" >> "$BASH_ENV"
            clang --version 2>&1 | head -1

      # ── Step 2: Get kernel source (local or clone) ─────
      - run:
          name: "Get kernel source (local or clone)"
          command: |
            if [ -d "$KERNEL_SRC/arch/arm64" ]; then
              echo "Using local $KERNEL_SRC"
            else
              echo "Cloning LineageOS kernel..."
              git clone --depth=1 https://github.com/LineageOS/android_kernel_qcom_sm8150 "$KERNEL_SRC"
            fi
            ls "$KERNEL_SRC/arch/arm64/configs/" | head -5

      # ── Step 3: KernelSU-Next v3.2.0 ──────────────────
      - run:
          name: "KernelSU-Next v3.2.0"
          command: |
            cd "$KERNEL_SRC" || { echo "WARN: kernel_src not found"; exit 0; }
            if [ -d "KernelSU/kernel" ]; then
              echo "KernelSU already present"
              exit 0
            fi
            KSU_OK=0
            for URL in \
              "https://github.com/KernelSU-Next/KernelSU" \
              "https://github.com/negrroo/KernelSU" \
              "https://github.com/tiann/KernelSU"; do
              if GIT_TERMINAL_PROMPT=0 git clone --depth=1 --branch main \
                --config "credential.helper=" "$URL" KernelSU 2>/dev/null; then
                KSU_OK=1; break
              fi
              rm -rf KernelSU
            done
            if [ "$KSU_OK" = "0" ]; then
              for URL in \
                "https://github.com/KernelSU-Next/KernelSU" \
                "https://github.com/negrroo/KernelSU" \
                "https://github.com/tiann/KernelSU"; do
                if GIT_TERMINAL_PROMPT=0 git clone --depth=1 --branch v3.2.0 \
                  --config "credential.helper=" "$URL" KernelSU 2>/dev/null; then
                  KSU_OK=1; break
                fi
                rm -rf KernelSU
              done
            fi
            if [ "$KSU_OK" = "1" ] && [ -f KernelSU/kernel/setup.sh ]; then
              bash KernelSU/kernel/setup.sh -o KernelSU 2>/dev/null || true
            fi
            [ "$KSU_OK" = "1" ] && echo "KernelSU ready" || echo "WARNING: no KernelSU"

      # ── Step 4: SuSFS v2.1.0 ──────────────────────────
      - run:
          name: "SuSFS v2.1.0"
          command: |
            cd "$KERNEL_SRC" || { echo "WARN: kernel_src not found"; exit 0; }
            [ -f ".susfs_v210" ] && { echo "SuSFS already applied"; exit 0; }
            set +e
            for REPO in \
              "https://github.com/AnymoreProject/susfs4ksu" \
              "https://github.com/sidex15/susfs4ksu"; do
              TMPD=$(mktemp -d)
              if GIT_TERMINAL_PROMPT=0 git clone --depth=1 \
                --config "credential.helper=" "$REPO" "$TMPD/r" 2>/dev/null; then
                PF=$(find "$TMPD/r" -name "*4.14*.patch" 2>/dev/null | sort | head -1)
                if [ -n "$PF" ] && grep -q "susfs" "$PF" 2>/dev/null; then
                  patch -p1 --forward < "$PF" 2>/dev/null
                  touch .susfs_v210
                  echo "SuSFS applied from $REPO"
                fi
              fi
              rm -rf "$TMPD"
              [ -f .susfs_v210 ] && break
            done
            set -e
            echo "SuSFS step done"

      # ── Step 5: Copy infinity files ─────────────────────
      - run:
          name: "Copy infinity kernel files"
          command: |
            REPO_DIR="$PWD"
            cd "$KERNEL_SRC" || { echo "ERROR: $KERNEL_SRC not found"; exit 1; }
            cp -v "$REPO_DIR/arch/arm64/configs/infinity_defconfig" arch/arm64/configs/infinity_defconfig
            cp -v "$REPO_DIR/include/linux/infinity_charging_control.h" include/linux/infinity_charging_control.h
            cp -rv "$REPO_DIR/drivers/charging" drivers/charging
            grep -q 'source "drivers/charging/Kconfig"' drivers/Kconfig 2>/dev/null \
              || echo 'source "drivers/charging/Kconfig"' >> drivers/Kconfig
            grep -q 'obj-$(CONFIG_CHARGING_CONTROL)' drivers/Makefile 2>/dev/null \
              || echo 'obj-$(CONFIG_CHARGING_CONTROL)      += charging/' >> drivers/Makefile
            cp -rv "$REPO_DIR/patches" patches
            echo "Files copied OK"

      # ── Step 6: Config ────────────────────────────────
      - run:
          name: "Config (sm8150_defconfig + merge + disable + HIDDEN)"
          command: |
            cd "$KERNEL_SRC"
            PROTECTED="CONFIG_NO_HZ_COMMON CONFIG_NO_HZ_IDLE CONFIG_VIRT_CPU_ACCOUNTING_GEN CONFIG_CONTEXT_TRACKING CONFIG_NO_HZ CONFIG_HZ_PERIODIC CONFIG_NO_HZ_FULL CONFIG_CPUSETS"
            DISABLE="CONFIG_STAGING CONFIG_SOUND CONFIG_SND CONFIG_RC_CORE CONFIG_MEDIA_SUPPORT CONFIG_FB CONFIG_VT CONFIG_VHOST CONFIG_COMEDI CONFIG_AGP CONFIG_INFINIBAND CONFIG_MHI_BUS CONFIG_MHI_QCOM"
            make ARCH=arm64 vendor/sm8150_defconfig O=out
            scripts/kconfig/merge_config.sh -O out/ out/.config arch/arm64/configs/infinity_defconfig || true
            make ARCH=arm64 olddefconfig O=out </dev/null || true
            disable_cfgs() {
              for cfg in $DISABLE; do
                _s=0; for p in $PROTECTED; do [ "$cfg" = "$p" ] && _s=1 && break; done
                [ "$_s" = "1" ] && continue
                sed -i "s/^${cfg}=y/# ${cfg} is not set/" out/.config
                sed -i "s/^${cfg}=m/# ${cfg} is not set/" out/.config
              done
              sed -i 's/^CONFIG_CC_STACKPROTECTOR=y/# CONFIG_CC_STACKPROTECTOR is not set/' out/.config
              sed -i 's/^CONFIG_CC_STACKPROTECTOR_STRONG=y/# CONFIG_CC_STACKPROTECTOR_STRONG is not set/' out/.config
              sed -i '/^CONFIG_CC_STACKPROTECTOR_NONE/d' out/.config
              echo "CONFIG_CC_STACKPROTECTOR_NONE=y" >> out/.config
            }
            disable_cfgs
            make ARCH=arm64 olddefconfig O=out </dev/null || true
            disable_cfgs
            make ARCH=arm64 olddefconfig O=out </dev/null || true
            for cfg in $DISABLE; do
              _s=0; for p in $PROTECTED; do [ "$cfg" = "$p" ] && _s=1 && break; done
              [ "$_s" = "1" ] && continue
              sed -i "/^${cfg}=/d" out/.config
              grep -q "^# ${cfg} is not set" out/.config \
                || echo "# ${cfg} is not set" >> out/.config
            done
            make ARCH=arm64 olddefconfig O=out </dev/null || true
            HIDDEN="CONFIG_SCHED_INFO CONFIG_PINCTRL CONFIG_POSIX_TIMERS CONFIG_RTC_CLASS CONFIG_SCHED_WALT CONFIG_DEBUG_REGULATOR"
            make ARCH=arm64 O=out -j1 scripts 2>&1 | tail -3 || true
            for cfg in $HIDDEN; do
              grep -q "^${cfg}=y" out/.config \
                || { sed -i "/^# ${cfg} is not set/d" out/.config; echo "${cfg}=y" >> out/.config; }
              [ -f out/include/config/auto.conf ] && {
                grep -q "^${cfg}=y" out/include/config/auto.conf \
                  || { sed -i "/^${cfg}=/d" out/include/config/auto.conf; echo "${cfg}=y" >> out/include/config/auto.conf; };
              }
              [ -f out/include/generated/autoconf.h ] && {
                grep -q "#define ${cfg} 1" out/include/generated/autoconf.h \
                  || { sed -i "/#define ${cfg} /d" out/include/generated/autoconf.h; echo "#define ${cfg} 1" >> out/include/generated/autoconf.h; };
              }
            done
            touch out/include/config/auto.conf out/include/generated/autoconf.h 2>/dev/null || true
            echo "Config ready"

      # ── Step 7: OpenSSL 3.0 ──────────────────────────
      - run:
          name: "OpenSSL 3.0 patches"
          command: |
            cd "$KERNEL_SRC"
            [ -f "certs/extract-cert.c" ] \
              && sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' certs/extract-cert.c
            [ -f "scripts/sign-file.c" ] \
              && sed -i '1i #define OPENSSL_SUPPRESS_DEPRECATED 1' scripts/sign-file.c
            echo "OpenSSL patched"

      # ── Step 8: apply_all.sh + SuSFS config ───────────
      - run:
          name: "Apply patches + SuSFS config"
          command: |
            cd "$KERNEL_SRC"
            [ -f patches/apply_all.sh ] && bash patches/apply_all.sh .
            grep -q "CONFIG_SUFS_FS" out/.config 2>/dev/null \
              || { find . -name "Kconfig.sufs" -o -name "Kconfig.susfs" 2>/dev/null \
                | head -1 | grep -q . \
                && { echo "CONFIG_SUFS_FS=y" >> out/.config; echo "CONFIG_SUFS=y" >> out/.config; }; }
            make ARCH=arm64 olddefconfig O=out </dev/null || true

      # ── Step 9: Source compat fixes (15 fixes) ────────
      - run:
          name: "Source compat fixes (15 fixes)"
          command: |
            cd "$KERNEL_SRC"
            echo "=== Fix 1/15: filter.h compat_uptr_t ==="
            if [ -f "include/linux/filter.h" ]; then
              echo 'BEGIN{a=0} /struct compat_sock_fprog/{if(!a){print "#ifdef CONFIG_COMPAT";a=1}} a&&/};/{print $0;print "#endif";a=0;next} {print $0}' > /tmp/fix_filter.awk
              awk -f /tmp/fix_filter.awk include/linux/filter.h > /tmp/filter.h.fixed
              mv /tmp/filter.h.fixed include/linux/filter.h
              echo "  Done"
            fi
            echo "=== Fix 2/15: hugetlbpage.c ptep ==="
            [ -f "mm/hugetlbpage.c" ] \
              && { sed -i 's/ptep = huge_pmd_share/pte = huge_pmd_share/' mm/hugetlbpage.c; echo "  Done"; }
            echo "=== Fix 3/15: huge_memory.c try_to_unmap ==="
            [ -f "mm/huge_memory.c" ] \
              && { sed -i 's/try_to_unmap(page, ttu_flags);/try_to_unmap(page, ttu_flags, NULL);/' mm/huge_memory.c; echo "  Done"; }
            echo "=== Fix 4/15: khugepaged.c nr_ptes ==="
            [ -f "mm/khugepaged.c" ] \
              && { sed -i '/atomic_long_dec(&mm->nr_ptes)/d' mm/khugepaged.c; echo "  Done"; }
            echo "=== Fix 5/15: sock.c compat_timeval ==="
            if [ -f "net/core/sock.c" ] && grep -q 'compat_timeval' net/core/sock.c; then
              echo '#ifndef COMPAT_USE_64BIT_TIME' > /tmp/cg.h
              echo '#define COMPAT_USE_64BIT_TIME 0' >> /tmp/cg.h
              echo '#endif' >> /tmp/cg.h
              echo 'struct compat_timeval { s32 tv_sec; s32 tv_usec; };' >> /tmp/cg.h
              LI=$(grep -n '^#include' net/core/sock.c | tail -1 | cut -d: -f1)
              [ -n "$LI" ] && sed -i "${LI}r /tmp/cg.h" net/core/sock.c
              rm -f /tmp/cg.h
              echo "  Done"
            fi
            echo "=== Fix 6/15: net/compat.c ==="
            if [ -f "net/compat.c" ] && ! grep -q 'CONFIG_COMPAT' net/compat.c; then
              echo '#ifdef CONFIG_COMPAT' | cat - net/compat.c > /tmp/cc.tmp && mv /tmp/cc.tmp net/compat.c
              echo '#endif' >> net/compat.c
              echo "  Done"
            fi
            echo "=== Fix 7/15: fs/compat.c ==="
            if [ -f "fs/compat.c" ] && ! grep -q 'CONFIG_COMPAT' fs/compat.c; then
              echo '#ifdef CONFIG_COMPAT' | cat - fs/compat.c > /tmp/fc.tmp && mv /tmp/fc.tmp fs/compat.c
              echo '#endif' >> fs/compat.c
              echo "  Done"
            fi
            echo "=== Fix 8/15: task_mmu.c pmd_t int-conversion ==="
            if [ -f "fs/proc/task_mmu.c" ]; then
              sed -i 's/pmd_t \*pmd = \([^(:]*\)/pmd_t *pmd = (pmd_t *)(\1)/g' fs/proc/task_mmu.c 2>/dev/null || true
              echo "  Done"
            fi
            echo "=== Fix 9/15: blktrace.c kernfs_node_id ==="
            if [ -f "kernel/trace/blktrace.c" ]; then
              sed -i 's/union kernfs_node_id \*id/u64 id/g' kernel/trace/blktrace.c 2>/dev/null || true
              echo "  Done"
            fi
            echo "=== Fix 10/15: fault-inject.c ==="
            if [ -f "lib/fault-inject.c" ]; then
              sed -i 's/should_fail_ex(__get_free_pages/should_fail_ex(__get_free_pages,/' lib/fault-inject.c 2>/dev/null || true
              echo "  Done"
            fi
            echo "=== Fix 11/15: trace_event_perf.c ==="
            if [ -f "kernel/trace/trace_event_perf.c" ]; then
              sed -i 's/u64 event/u64 tp_event/' kernel/trace/trace_event_perf.c 2>/dev/null || true
              echo "  Done"
            fi
            echo "=== Fix 12/15: synaptics_tcm pinctrl ==="
            if [ -f "drivers/input/touchscreen/synaptics_tcm/synaptics_tcm_core.c" ]; then
              grep -q 'pinctrl/consumer.h' drivers/input/touchscreen/synaptics_tcm/synaptics_tcm_core.c 2>/dev/null \
                || sed -i '1i #include <linux/pinctrl/consumer.h>' drivers/input/touchscreen/synaptics_tcm/synaptics_tcm_core.c
              echo "  Done"
            fi
            echo "=== Fix 13/15: iommu-debug.c mapping stub ==="
            if [ -f "drivers/iommu/iommu-debug.c" ]; then
              echo '/* stubbed: dev_archdata.mapping removed */' > /tmp/iommu_stub.c
              echo '#include <linux/module.h>' >> /tmp/iommu_stub.c
              echo '#include <linux/device.h>' >> /tmp/iommu_stub.c
              echo 'void iommu_debugfs_setup(void) {}' >> /tmp/iommu_stub.c
              echo 'void iommu_debugfs_add_device(struct device *dev) {}' >> /tmp/iommu_stub.c
              echo 'void iommu_debugfs_remove_device(struct device *dev) {}' >> /tmp/iommu_stub.c
              echo 'EXPORT_SYMBOL(iommu_debugfs_setup);' >> /tmp/iommu_stub.c
              echo 'EXPORT_SYMBOL(iommu_debugfs_add_device);' >> /tmp/iommu_stub.c
              echo 'EXPORT_SYMBOL(iommu_debugfs_remove_device);' >> /tmp/iommu_stub.c
              cp /tmp/iommu_stub.c drivers/iommu/iommu-debug.c
              rm -f /tmp/iommu_stub.c
              echo "  Done"
            fi
            echo "=== Fix 14/15: -Wno-int-conversion (KCFLAGS) ==="
            echo "  (applied in build step)"
            echo "=== Fix 15/15: -Wno-int-conversion (KCFLAGS) ==="
            echo "  (applied in build step)"
            echo "=== All 15 fixes applied ==="

      # ── Step 10: Clean source tree ────────────────────
      - run:
          name: "Clean source tree"
          command: |
            cd "$KERNEL_SRC"
            rm -f .config
            rm -rf include/config

      # ── Step 11: Build (Neutron Clang) ────────────────
      - run:
          name: "Build Infinity Kernel"
          no_output_timeout: 30m
          command: |
            cd "$KERNEL_SRC"
            make ARCH=arm64 O=out olddefconfig </dev/null 2>&1 || true
            HIDDEN="CONFIG_SCHED_INFO CONFIG_PINCTRL CONFIG_POSIX_TIMERS CONFIG_RTC_CLASS CONFIG_SCHED_WALT CONFIG_DEBUG_REGULATOR"
            for cfg in $HIDDEN; do
              grep -q "^${cfg}=y" out/.config \
                || { sed -i "/^# ${cfg} is not set/d" out/.config; echo "${cfg}=y" >> out/.config; }
              [ -f out/include/config/auto.conf ] && {
                grep -q "^${cfg}=y" out/include/config/auto.conf \
                  || { sed -i "/^${cfg}=/d" out/include/config/auto.conf; echo "${cfg}=y" >> out/include/config/auto.conf; };
              }
              [ -f out/include/generated/autoconf.h ] && {
                grep -q "#define ${cfg} 1" out/include/generated/autoconf.h \
                  || { sed -i "/#define ${cfg} /d" out/include/generated/autoconf.h; echo "#define ${cfg} 1" >> out/include/generated/autoconf.h; };
              }
            done
            touch out/include/config/auto.conf out/include/generated/autoconf.h 2>/dev/null || true
            make O=out ARCH=arm64 CC=clang \
              CROSS_COMPILE=aarch64-linux-gnu- \
              CROSS_COMPILE_COMPAT=arm-linux-gnueabi- \
              AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
              OBJDUMP=llvm-objdump STRIP=llvm-strip \
              HOSTCC=gcc HOSTCFLAGS="-Wall -Wmissing-prototypes -Wstrict-prototypes -O2 -fomit-frame-pointer -std=gnu89 -Wno-error" \
              KCFLAGS="-Wno-error -Wno-int-conversion" -j$(nproc) Image.gz-dtb dtbs \
              2>&1 | tee /tmp/kernel_build.log
            RET=${PIPESTATUS[0]}
            if [ "$RET" -ne 0 ]; then
              echo "=========================================="
              echo "  BUILD ERROR (exit $RET)"
              echo "=========================================="
              grep -E "error:" /tmp/kernel_build.log | head -40
              tail -80 /tmp/kernel_build.log
              exit 1
            fi

      # ── Step 12: Package ──────────────────────────────
      - run:
          name: "Package AnyKernel3 ZIP"
          command: |
            IMG="$KERNEL_SRC/out/arch/arm64/boot/Image.gz-dtb"
            if [ ! -f "$IMG" ]; then
              echo "ERROR: Image.gz-dtb not found"
              ls -la "$KERNEL_SRC/out/arch/arm64/boot/" 2>/dev/null
              exit 1
            fi
            echo "Image: $(du -sh "$IMG" | cut -f1)"
            cp -v "$IMG" AnyKernel3/
            cd AnyKernel3
            zip -r9 "/tmp/infinity-kernel-${VERSION}.zip" *

      - store_artifacts:
          path: /tmp/infinity-kernel-v1.0.59.zip
          destination: infinity-kernel-v1.0.59.zip

workflows:
  infinity_build:
    jobs:
      - build